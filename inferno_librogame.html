ino\n\n👉 Vai a §277B","278":"Indovino sconfitto\n\nL'indovino cade. Il collo si gira ancora.\n\n\"Meglio così. Non vedevo nulla di buono.\"\n\nScompare.\n\n👉 Vai a §280","279":"Sconfitto dall'Indovino\n\nL'indovino ti colpisce al petto.\n\n❤️ RESISTENZA -4\n\n💀 GAME OVER – Ucciso da un indovino\n\nRicomincia dall'ultimo salvataggio.","280":"Quarta bolgia: i barattieri\n\nScendi. Un lago di pece bollente. Anime emergono e riaffondano.\n\nUn diavolo nero corre lungo la riva.\n\n\"Un vivo! Acchiappiamolo!\"\n\n⚠️ COMBATTIMENTO – Diavolo Malebranche\n\n👉 Vai a §280B","281":"Diavolo sconfitto\n\nIl diavolo cade nella pece. Brucia. Scompare.\n\nGli altri diavoli ti guardano.\n\n\"È forte. Lasciamolo passare.\"\n\nAttraversi.\n\n❤️ RESISTENZA -2\n\n👉 Vai a §283","282":"Sconfitto dal Diavolo\n\nIl diavolo ti colpisce con la forca.\n\n❤️ RESISTENZA -5\n\n💀 GAME OVER – Ucciso dai Malebranche\n\nRicomincia dall'ultimo salvataggio.","283":"Quinta bolgia: gli ipocriti\n\nScendi. Anime vestite di cappe di piombo. Camminano piano.\n\nUno ti guarda.\n\n\"Sei stanco? Immagina portare questo per sempre.\"\n\n👉 Se provi a sollevare la cappa, vai a §284\n👉 Se prosegui, vai a §285","284":"Sollevare la cappa\n\nProvi. È pesantissima.\n\nL'anima ride.\n\n\"Non puoi. È inchiodata alla nostra anima.\"\n\n⭐ MORALE -1\n\n👉 Vai a §285","285":"Attraversare gli ipocriti\n\nCammini. Le cappe tintinnano. Un ponte davanti a te.\n\nA metà, una figura senza cappa.\n\n\"Non tutti gli ipocriti portano il peso. Alcuni lo nascondono meglio.\"\n\n⚠️ COMBATTIMENTO – Ipocrita Senza Cappa\n\n👉 Vai a §285B","286":"Ipocrita sconfitto\n\nL'anima cade dal ponte.\n\n\"Ha vinto. Lascialo passare.\"\n\n❤️ RESISTENZA -1\n\n👉 Vai a §288","287":"Sconfitto dall'Ipocrita\n\nL'anima ti colpisce. Cadi dal ponte.\n\nAtterri tra gli ipocriti. Le cappe ti schiacciano.\n\n💀 GAME OVER – Schiacciato\n\nRicomincia dall'ultimo salvataggio.","288":"Sesta bolgia: i ladri\n\nScendi. Serpenti ovunque. Anime che si trasformano in rettili.\n\nUn serpente ti si avvolge alla caviglia.\n\n⚠️ COMBATTIMENTO – Serpente della Bolgia\n\n👉 Vai a §288B","289":"Serpente sconfitto\n\nTagli la testa. Il serpente si dissolve.\n\nAltri serpenti ti guardano. Corri.\n\n❤️ RESISTENZA -1\n\n👉 Vai a §291","290":"Morso dal serpente\n\nIl veleno entra nel sangue.\n\n❤️ RESISTENZA -3\n\n💀 GAME OVER – Ucciso dal veleno\n\nRicomincia dall'ultimo salvataggio.","291":"Settima bolgia: i consiglieri fraudolenti\n\nScendi. Fiamme che camminano. Lingue di fuoco che parlano.\n\nUna fiamma si avvicina.\n\n\"Dante? Sei tu?\"\n\n\"Ulisse,\" sussurra Dante.\n\n👉 Se ti avvicini, vai a §292\n👉 Se osservi da lontano, vai a §293","292":"Parlare con Ulisse\n\n\"Racconta,\" chiedi.\n\nLa fiamma trema.\n\n\"Oltre le colonne d'Ercole, oltre i limiti del mondo, ho spinto i miei uomini. Abbiamo visto un monte. Poi una tempesta. E naufragammo.\"\n\n\"Ne valeva la pena?\"\n\n\"Sì. Sapere è meglio che vivere.\"\n\n⭐ MORALE +1\n\n👉 Vai a §294","293":"Osservare da lontano\n\nResti indietro. Ulisse ti vede lo stesso.\n\n\"Non ti avvicini? Hai paura della verità?\"\n\n\"Forse.\"\n\n\"Allora non la meriti.\"\n\n👉 Vai a §294","294":"Attraversare le fiamme\n\nCammini. Le fiamme parlano tutte insieme.\n\n🧠 PROVA DI PSICHE – Soglia 14\nTira 1D10 + PSICHE\n\n👉 Se SUPERI, vai a §295\n👉 Se FALLISCI, vai a §296","295":"Resistere alle voci\n\nResisti. Le fiamme si zittiscono.\n\n\"Hai volontà.\"\n\n👉 Vai a §297","296":"Cedere a una voce\n\nUna voce ti sussurra. Ti fermi.\n\nLa fiamma ti sfiora.\n\n❤️ RESISTENZA -2\n\n👉 Vai a §297","297":"Ottava bolgia: i seminatori di discordia\n\nScendi. Anime tagliate a pezzi. Braccia che camminano. Teste che rotolano.\n\nUna testa ti rotola contro.\n\n\"Tu! Sei di parte?\"\n\n⚠️ COMBATTIMENTO – Seminatore di Discordia\n\n👉 Vai a §297B","298":"Seminatore sconfitto\n\nIl corpo cade a pezzi.\n\n\"Meglio così. Ero stanco di odiare.\"\n\n👉 Vai a §300","299":"Sconfitto dal Seminatore\n\nIl seminatore ti taglia un braccio.\n\n❤️ RESISTENZA -6\n\n💀 GAME OVER – Ucciso\n\nRicomincia dall'ultimo salvataggio.","300":"Nona bolgia: i seminatori di discordia (seconda parte)\n\nProsegui. Un'altra figura emerge. Ha il corpo tagliato a metà.\n\n\"Maometto,\" dice Dante.\n\n\"E quello? Quello con la faccia spaccata?\"\n\n\"Alì. Suo successore. In vita divisero la fede. Ora sono divisi nel corpo.\"\n\nMaometto ti guarda.\n\n\"Vivo, ricordati: l'unità è forza. La divisione è debolezza.\"\n\n⭐ MORALE +1\n\n👉 Vai a §301","301":"Decima bolgia: i falsari\n\nScendi nell'ultima bolgia. Anime malate. Lebbrosi. Idropici. Pazzi.\n\nUn'anima senza volto ti si avvicina.\n\n\"Che faccia ho?\"\n\n\"Non lo so.\"\n\n\"Esatto. Io non so chi sono.\"\n\n⚠️ COMBATTIMENTO – Falsario\n\n👉 Vai a §301B","302":"Falsario sconfitto\n\n\"Sei nessuno.\"\n\nL'anima si dissolve.\n\n\"Grazie. Ora so chi sono. Nessuno.\"\n\nL'ottavo cerchio è finito.\n\n❤️ RESISTENZA -1\n\nSei a zero. Ma vivo.\n\n👉 Vai a §304","303":"Sconfitto dal Falsario\n\nL'anima ti colpisce. La tua faccia diventa come la sua.\n\n💀 GAME OVER – Diventato un falsario\n\nRicomincia dall'ultimo salvataggio.","304":"L'uscita dalle Malebolge\n\nLe dieci bolge sono alle tue spalle.\n\nDavanti a te, un pozzo. Più profondo di tutti.\n\n\"L'ultimo,\" dice Dante. \"Il nono cerchio. I traditori.\"\n\n\"Com'è?\"\n\n\"Ghiaccio. Silenzio. E Lucifero.\"\n\n👉 Se scendi, vai a §305\n👉 Se chiedi a Dante di Lucifero, vai a §306","305":"Scendere al nono cerchio\n\nScendi. Le pareti sono lisce, scivolose.\n\nPiù scendi, più fa freddo. Il respiro diventa vapore.\n\nPoi, il fondo.\n\nUn lago di ghiaccio. Anime intrappolate. Sommerse. Mute.\n\n\"Benvenuto a Cocito,\" dice Dante. \"Il nono cerchio. I traditori.\"\n\n\"Quattro zone?\"\n\n\"Sì. Caina, Antenora, Ptolomea, Giudecca. Ogni zona un tradimento diverso.\"\n\n👉 Se cammini sul ghiaccio, vai a §307\n👉 Se chiedi a Dante delle zone, vai a §308","306":"\"Com'è Lucifero?\"\n\n\"Com'è Lucifero?\" chiedi.\n\nDante esita.\n\n\"È gigante. Ha tre facce. Sei ali. Piange. E mastica.\"\n\n\"Mastica?\"\n\n\"I tre traditori più grandi: Giuda, Bruto, Cassio.\"\n\n\"Li uccide?\"\n\n\"Li tiene in bocca. Per l'eternità.\"\n\n👉 Se scendi, vai a §305\n👉 Se chiedi come si esce, vai a §309","307":"Camminare sul ghiaccio\n\nCammini. Sotto i piedi, facce. Anime intrappolate. Ti guardano. Non parlano.\n\nUn'anima sotto il ghiaccio ti afferra la caviglia.\n\n\"Resta con noi.\"\n\n⚠️ COMBATTIMENTO – Traditore del Ghiaccio\n\n👉 Vai a §307B","308":"\"Quali sono le zone?\"\n\n\"Caina: traditori dei parenti. Antenora: traditori della patria. Ptolomea: traditori degli ospiti. Giudecca: traditori dei benefattori.\"\n\n\"Qual è la peggiore?\"\n\n\"Giudecca. Là c'è Lucifero.\"\n\n👉 Vai a §307","309":"\"Come si esce?\"\n\n\"Come si esce?\" chiedi.\n\nDante guarda il pozzo.\n\n\"Scalando Lucifero.\"\n\n\"Cosa?\"\n\n\"Lui è gigante. Arriva al centro della terra. Lo scavalchi e scendi dall'altra parte.\"\n\n\"E poi?\"\n\n\"Poi il Purgatorio.\"\n\n👉 Se scendi, vai a §305\n👉 Se esiti, vai a §312","310":"Traditore perdonato\n\n\"Ti perdono,\" dici.\n\nL'anima si scioglie.\n\n\"Grazie. Nessuno mi aveva mai perdonato.\"\n\n⭐ MORALE +1\n\n👉 Vai a §313","311":"Sconfitto dal Traditore\n\nL'anima ti trascina sotto il ghiaccio.\n\n❤️ RESISTENZA -5\n\n💀 GAME OVER – Congelato\n\nRicomincia dall'ultimo salvataggio.","312":"Esitare\n\nEsiti. Dante ti guarda.\n\n\"Non c'è tempo. Ogni minuto qui è un'eternità.\"\n\n👉 Se scendi, vai a §305\n👉 Se aspetti ancora, vai a §314","313":"Antenora (traditori della patria)\n\nCammini. Arrivi a una zona dove le anime sono più fitte.\n\nUna in particolare. Un uomo che rosicchia la testa di un altro.\n\n\"Chi sono?\" chiedi.\n\n\"Conte Ugolino,\" dice Dante. \"E quello che rosicchia è l'arcivescovo Ruggieri.\"\n\n\"Perché?\"\n\n\"Ruggieri lo tradì. Lo chiuse in una torre con i figli. Morirono di fame.\"\n\nUgolino alza lo sguardo.\n\n\"Vivo. Porta la mia storia nel mondo. Così sanno cosa significa tradimento.\"\n\n👉 Se prometti di raccontare, vai a §315\n👉 Se non rispondi, vai a §316","314":"Aspettare ancora\n\nAspetti. Il freddo aumenta.\n\nLe dita diventano blu.\n\n❤️ RESISTENZA -2\n\nDante ti afferra.\n\n\"Ora basta. Scendiamo.\"\n\n👉 Vai a §305","315":"Promettere a Ugolino\n\n\"Lo racconterò,\" prometti.\n\nUgolino annuisce.\n\n\"Allora la mia pena ha un senso.\"\n\nContinua a rosicchiare.\n\n⭐ MORALE +1\n\n👉 Vai a §317","316":"Non rispondere\n\nResti in silenzio.\n\nUgolino ti maledice.\n\n\"Allora marcisci anche tu, nel ricordo.\"\n\n⭐ MORALE -1\n\n👉 Vai a §317","317":"Ptolomea (traditori degli ospiti)\n\nProsegui. Anime sdraiate sul ghiaccio. Lacrime gelate sugli occhi.\n\nUno di loro parla.\n\n\"Frate Alberigo. Tradii i miei commensali. Ora non posso nemmeno piangere. Le lacrime gelano.\"\n\n\"Quanto resti qui?\"\n\n\"Finché un altro non prenderà il mio posto.\"\n\n👉 Se provi a consolarlo, vai a §318\n👉 Se prosegui, vai a §319","318":"Consolare Frate Alberigo\n\n\"Mi dispiace,\" dici.\n\nLui ride amaro.\n\n\"Non dispiacerti. Ho fatto quello che ho fatto. Ora pago.\"\n\n\"Non cerchi perdono?\"\n\n\"Non lo merito.\"\n\n👉 Vai a §319","319":"Giudecca (Lucifero)\n\nCammini. Il ghiaccio è spesso. Le anime sono completamente sommerse.\n\nPoi, davanti a te, una sagoma immensa.\n\nTre facce. Sei ali. Piange.\n\nLucifero.\n\n\"Eccolo,\" dice Dante.\n\nLa paura ti blocca.\n\n⚠️ PROVA DI PSICHE – Soglia 15\nTira 1D10 + PSICHE\n\n👉 Se SUPERI, vai a §320\n👉 Se FALLISCI, vai a §321","320":"Resistere a Lucifero\n\nResisti. Guardi Lucifero negli occhi.\n\nPiange. Non è feroce. È triste.\n\n\"È solo,\" sussurri.\n\n\"È dannato,\" corregge Dante.\n\n\"Come si esce?\"\n\n\"Di là,\" dice, indicando il corpo di Lucifero.\n\n\"Scaliamo?\"\n\n\"Scaliamo.\"\n\n👉 Vai a §322","321":"Cedere al terrore\n\nLa paura ti blocca. Non riesci a muoverti.\n\nDante ti trascina.\n\n❤️ RESISTENZA -3\n⭐ MORALE -2\n\n👉 Vai a §322","322":"Scalare Lucifero\n\nTi arrampichi sul corpo di Lucifero. È freddo. Duro. Immenso.\n\nLe ali battono. Il vento è gelido.\n\n\"Non guardare giù,\" dice Dante.\n\nGuardi giù. L'abisso.\n\n🧠 PROVA DI PSICHE – Soglia 13\nTira 1D10 + PSICHE\n\n👉 Se SUPERI, vai a §323\n👉 Se FALLISCI, vai a §324","323":"La cima\n\nArrivi in cima. Le ali di Lucifero sono alle tue spalle.\n\nDavanti a te, un tunnel. Buio. Ma diverso.\n\n\"Là fuori c'è il Purgatorio,\" dice Dante.\n\n\"Ci andiamo?\"\n\n\"Tu sì. Io no.\"\n\n\"Perché?\"\n\n\"Perché io sono già dannato. Ti ho accompagnato fin qui. Ora devi proseguire da solo.\"\n\n👉 Se saluti Dante, vai a §325\n👉 Se chiedi perché ti ha aiutato, vai a §326\n👉 Se esiti, vai a §327","324":"Perdere la presa\n\nPerdi la presa. Cadi.\n\nIl vento ti trascina giù. Lucifero ti guarda con le sue tre facce.\n\n💀 GAME OVER – Caduto nell'abisso\n\nRicomincia dall'ultimo salvataggio.","325":"Salutare Dante\n\n\"Grazie,\" dici.\n\nDante annuisce.\n\n\"Sei sopravvissuto. Non tutti ci riescono.\"\n\n\"Ci rivedremo?\"\n\n\"Nel Paradiso, forse. Se arrivi.\"\n\nScompare.\n\n👉 Vai a §328","326":"\"Perché mi hai aiutato?\"\n\n\"Perché mi hai aiutato?\" chiedi.\n\nDante ti guarda.\n\n\"Perché nessuno mi ha aiutato quando ero vivo. E ho giurato che non sarebbe successo ad altri.\"\n\n\"Ma sei dannato.\"\n\n\"Sì. Ma non crudele.\"\n\nScompare.\n\n⭐ MORALE +2\n\n👉 Vai a §328","327":"Esitare\n\nEsiti. Non vuoi lasciarlo.\n\n\"Vai,\" dice Dante. \"Non posso starti accanto per sempre.\"\n\n\"Lo so.\"\n\n\"Allora vai.\"\n\nScompare.\n\n👉 Vai a §328","328":"L'uscita\n\nEntri nel tunnel.\n\nBuio. Freddo. Ma senti odore di aria nuova.\n\nCammini. Minuti. Ore. Non sai.\n\nPoi, una luce.\n\nNon quella dell'Inferno. Un'altra. Più calda. Più dolce.\n\n\"La luce del Purgatorio,\" dici da solo.\n\nEsci.\n\nIl sole ti colpisce il volto.\n\nSei vivo.\n\n👉 Vai a §329\n\n\n================================================================================\nEPILOGO – IL RISVEGLIO\n================================================================================","329":"Sulla spiaggia\n\nLa luce del sole ti acceca. Chiudi gli occhi per un momento.\n\nQuando li riapri, sei su una spiaggia. Sabbia fine. Mare calmo. Cielo azzurro.\n\nNiente fiamme. Niente urla. Niente puzza di zolfo.\n\n\"Ce l'ho fatta,\" dici da solo.\n\nUna voce alle tue spalle:\n\n\"Non ancora.\"\n\nTi volti. Un uomo anziano, con una barba lunga e bianca, ti osserva.\n\n\"Chi sei?\"\n\n\"Catone. Guardiano del Purgatorio.\"\n\n\"E io?\"\n\n\"Sei un vivo che ha attraversato l'Inferno. Non è poco. Ma ora devi purificarti.\"\n\n👉 Se chiedi come, vai a §330\n👉 Se osservi il mare, vai a §331\n👉 Se chiedi di Dante, vai a §332","330":"\"Come mi purifico?\"\n\n\"Salendo,\" risponde Catone. \"Il Purgatorio è una montagna. Più sali, più ti liberi dei peccati.\"\n\n\"Quanti sono?\"\n\n\"Sette. Uno per ogni vizio capitale.\"\n\n\"Sembra faticoso.\"\n\n\"Lo è. Ma alla fine c'è il Paradiso.\"\n\n👉 Vai a §333","331":"Osservare il mare\n\nGuardi il mare. È calmo. Sereno. Dopo l'Inferno, sembra irreale.\n\n\"Bello,\" dici.\n\n\"È solo l'inizio,\" dice Catone. \"La vera bellezza è più in alto.\"\n\n👉 Vai a §333","332":"\"Dov'è Dante?\"\n\n\"Dante è tornato all'Inferno,\" risponde Catone. \"È la sua pena. Ma ti ha lasciato un messaggio.\"\n\n\"Quale?\"\n\n\"Prosegui. Non ti ha accompagnato fin qui per farti fermare.\"\n\n⭐ MORALE +1\n\n👉 Vai a §333","333":"La montagna\n\nCatone ti indica un sentiero che sale sulla montagna.\n\n\"Da qui comincia la tua salita. Non sarà facile. Ma nessuno ti obbliga.\"\n\n\"Lo so.\"\n\n\"Allora vai. O torna indietro. La scelta è tua.\"\n\n👉 Se inizi a salire, vai a §334\n👉 Se torni indietro verso l'Inferno, vai a §335","334":"Iniziare la salita\n\nMetti un piede sul sentiero.\n\nLa terra è solida. L'aria è pulita. Respiri a fondo.\n\n\"Addio, Inferno,\" dici.\n\nDietro di te, le porte di Dite si chiudono. Non le rivedrai mai più.\n\nDavanti a te, il Purgatorio.\n\n⭐ FINE DEL VOLUME 1 – INFERNO 2026\n\nIl tuo viaggio continua nel Volume 2: Purgatorio 2026.\n\n👉 Vai a §336","335":"Tornare indietro\n\nTorni indietro. Verso l'Inferno.\n\nLe porte di Dite sono ancora lì. Aperte. Ti aspettano.\n\n\"Sei sicuro?\" chiede Catone.\n\n\"Non lo so.\"\n\n\"Allora torna quando sarai pronto.\"\n\nVarchi di nuovo la soglia. Il calore ti avvolge. Le urla dei dannati ti riempiono le orecchie.\n\nHai scelto l'Inferno.\n\n💀 FINALE ALTERNATIVO – Sei tornato tra i dannati\n\nRicomincia dall'ultimo salvataggio o da §1.","336":"Il messaggio di Dante\n\nPrima di scomparire, Dante ti ha lasciato un ultimo messaggio. Lo trovi nella tasca del tuo giubbotto.\n\nÈ scritto su un pezzo di pergamena:\n\n\"Non dimenticare ciò che hai visto. L'Inferno è dentro di te. Ogni volta che rimandi, ogni volta che fuggi, ogni volta che scegli la via più facile, scendi un gradino. Ma ogni volta che combatti, che scegli, che affronti la verità, sali. Il Purgatorio è la via di mezzo. Il Paradiso è la meta. Non fermarti.\"\n\nSotto, una postilla:\n\n\"PS: La prossima volta, studia Dante prima dell'interrogazione.\"\n\nSorridi.\n\n⭐ MORALE +2\n\n\n👉 Vai a §337","337":"Cosa hai imparato\n\nRipensi al viaggio.\n\nHai visto l'Inferno. Hai incontrato dannati e poeti. Hai combattuto. Hai scelto. Hai sbagliato. Hai imparato.\n\nForse non sei lo stesso che è entrato nella selva.\n\nForse domani, a scuola, quando il professore ti interrogherà su Dante, non dirai \"non ho studiato\".\n\nDirai: \"L'ho vissuto.\"\n\n\n👉 Vai a §338","338":"Il risveglio\n\nApri gli occhi.\n\nSei sul balcone della casa al mare. Il libro di Dante è aperto sulle ginocchia. La lampada è accesa. Fuori, il mare respira.\n\nL'orologio segna le 23:47.\n\nLa stessa ora di quando sei partito.\n\nTi sembra di aver sognato. Ma la stanchezza nelle ossa è reale. E nella tasca del giubbotto... un pezzo di pergamena.\n\nIl messaggio di Dante.\n\nSorridi.\n\nChiudi il libro.\n\nDomani c'è l'interrogazione. Ma non hai paura.\n\nHai attraversato l'Inferno. Una verifica è niente.\n\n\n👉 Vai a §339","339":"Crediti\n\nINFERNO 2026 – VOLUME 1\nLibrogame ad alta tensione\nIspirato a Dante Alighieri e a Lupo Solitario (Joe Dever)\n\nSistema: Forza, Psiche, Resistenza, Morale\nParagrafi totali: 350\nCombattimenti: 31\nScelte: oltre 200\nGame over possibili: 15\n\nHai completato l'Inferno. Ora il Purgatorio ti aspetta.\n\n\n👉 Vai a §340","340":"Fine\n\nGrazie per aver giocato.\n\nSe vuoi continuare l'avventura, preparati per il Volume 2: Purgatorio 2026.\n\n⭐ FINE\n\n\n================================================================================\nRIEPILOGO COMBATTIMENTI (FILE B)\n================================================================================\n\n| N° | Paragrafo | Nemico |\n|:---|:---|:---|\n| 1 | §194B | Arpia della Guardia |\n| 2 | §199B | Esattore di Dite |\n| 3 | §205B | Eretico della Tomba |\n| 4 | §214B | Mano di Farinata |\n| 5 | §228B | Centauro del Flegetonte |\n| 6 | §240B | Centauro della Riva |\n| 7 | §247B | Bestemmiatore |\n| 8 | §253B | Il Rifiutante |\n| 9 | §269B | Adulatore |\n| 10 | §277B | Indovino |\n| 11 | §280B | Diavolo Malebranche |\n| 12 | §285B | Ipocrita Senza Cappa |\n| 13 | §288B | Serpente della Bolgia |\n| 14 | §297B | Seminatore di Discordia |\n| 15 | §301B | Falsario |\n| 16 | §307B | Traditore del Ghiaccio |\n\nTOTALE COMBATTIMENTI NEL FILE B: 16\n\nCOMBATTIMENTI TOTALI (FILE A + FILE B): 31\n\n================================================================================\nFINE DEL FILE B – INFERNO 2026 – VOLUME 1\n================================================================================One more step before you proceed...","22B":"COMBATTIMENTO: Guardiani della Soglia\n\nDue ombre si staccano dalla porta. Non hanno volto. Solo mani che cercano di afferrarti.\n\nNEMICO: Guardiani della Soglia (2)\nHP: 6 ciascuno\nDANNO: 2❤️ per round (ciascuno)\nDEBOLEZZA: Se colpisci uno, l'altro arretra per un round\n\nOPZIONI:\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2)\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2) – più efficace (+2)\n🛡️ Schivata (danno dimezzato)\n\n👉 Se VINCI, vai a §23\n👉 Se PERDI (RESISTENZA ≤ 0), vai a §24","24B":"COMBATTIMENTO: Mani della Soglia\n\nTre mani pallide emergono dal buio. Ti afferrano braccia e caviglie.\n\nNEMICO: Mani della Soglia (3)\nHP: 4 ciascuna\nDANNO: 1❤️ per round (ciascuna)\nDEBOLEZZA: Un colpo ben piazzato (tiro di FORZA ≥ 15) ne distrugge una\n\nOPZIONI:\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2)\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2)\n🛡️ Schivata (danno dimezzato)\n\n👉 Se VINCI, vai a §25\n👉 Se PERDI, vai a §24C","24C":"Sconfitta dalle Mani\n\nLe mani ti trascinano dentro la porta. Il buio ti inghiotte.\n\nQuando riapri gli occhi, sei in una gola profonda. Intorno a te, solo pietra e silenzio.\n\nNon sai dove sei. Non sai come uscire.\n\n❤️ RESISTENZA -4 → ora 16\n⭐ MORALE -1 → ora 6\n\n👉 Vai a §28 (cercare un varco)","25B":"COMBATTIMENTO: Strisciante della Selva\n\nUna creatura coperta di corteccia e muschio ti blocca la strada. I suoi occhi sono fessure verdi.\n\nNEMICO: Strisciante della Selva\nHP: 10\nDANNO: 3❤️ per round\nDEBOLEZZA: La paura (prova di PSICHE ogni round per non subire danno extra)\n\nOPZIONI:\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2)\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2)\n🛡️ Schivata (danno dimezzato)\n😨 Prova di PSICHE (soglia 12) – se superi, non subisci danno per quel round\n\n👉 Se VINCI, vai a §30\n👉 Se PERDI, vai a §29","28B":"COMBATTIMENTO: Spettro della Gola\n\nUna figura traslucida emerge dalla roccia. Urlano senza suono.\n\nNEMICO: Spettro della Gola\nHP: 8\nDANNO: 2❤️ per round + 1❤️ extra se fallisci prova di PSICHE\nDEBOLEZZA: Attacchi psichici (doppi danni)\n\nOPZIONI:\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2) – danno normale\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2) – danno doppio\n🛡️ Schivata (danno dimezzato)\n\n👉 Se VINCI, vai a §33 (riva dell'Acheronte)\n👉 Se PERDI, vai a §29","33B":"COMBATTIMENTO: Anime Ignave\n\nDue anime vestite di stracci ti attaccano. I loro occhi sono vuoti. Non parlano. Si limitano I:\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2)\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2) – più efficace\n🛡️ Schivata (danno dimezzato)\n\n👉 Se VINCI, vai a §197\n👉 Se PERDI, vai a §198","199B":"COMBATTIMENTO: Esattore di Dite\n\nUna figura scende dalla torre. Indossa una tunica nera. In mano ha una catena.\n\nNEMICO: Esattore di Dite\nHP: 12\nDANNO: 4❤️ per round\nDEBOLEZZA: La catena (se la afferri con FORZA ≥ 13, la strappi)\n\nOPZIONI:\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2)\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2)\n🛡️ Schivata (danno dimezzato)\n⛓️ Afferra la catena (prova di FORZA soglia 13)\n\n👉 Se VINCI, vai a §203\n👉 Se PERDI, vai a §198","205B":"COMBATTIMENTO: Eretico della Tomba\n\nL'uomo esce completamente dalla tomba. Ha una spada di fuoco.\n\nNEMICO: Eretico della Tomba\nHP: 14\nDANNO: 4❤️ per round\nDEBOLEZZA: I colpi alla testa (se tiri 9-10 sul dado)\n\nOPZIONI:\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2)\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2)\n🛡️ Schivata (danno dimezzato)\n🎯 Mira alla testa (se tiri 1D6 e fai 5-6, colpo critico)\n\n👉 Se VINCI, vai a §208\n👉 Se PERDI, vai a §209","214B":"COMBATTIMENTO: Mano di Farinata\n\nUna mano gigantesca esce dalla tomba e cerca di afferrarti.\n\nNEMICO: Mano di Farinata\nHP: 8\nDANNO: 3❤️ per round\nDEBOLEZZA: Colpisci le dita (tiro di FORZA ≥ 12)\n\nOPZIONI:\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2)\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2)\n🛡️ Schivata (danno dimezzato)\n✋ Colpisci le dita (prova di FORZA soglia 12)\n\n👉 Se VINCI, vai a §219\n👉 Se PERDI, vai a §220","222B":"Recupero con razione\n\nMangi. Le forze tornano un po'.\n\n❤️ RESISTENZA +3\n\nTi alzi. Sei pronto per scendere.\n\n👉 Vai a §221","222C":"Senza razioni\n\nNon hai cibo. Ti riposi lo stesso, ma il calore ti prosciuga.\n\n❤️ RESISTENZA -1\n\nTi alzi. Sei più debole di prima.\n\n👉 Vai a §221","228B":"COMBATTIMENTO: Centauro del Flegetonte\n\nIl centauro carica. Ha un arco e una lancia.\n\nNEMICO: Centauro del Flegetonte\nHP: 14\nDANNO: 4❤️ per roun // ── AUTH ──────────────────────────────────────
function checkAuth() {
  const raw = sessionStorage.getItem('icv_access');
  const ts  = sessionStorage.getItem('icv_ts');
  const libro = sessionStorage.getItem('icv_libro');
  if (!raw || !ts || !libro) { return; }
  // Scadenza 8 ore
  if (Date.now() - parseInt(ts) > 8 * 60 * 60 * 1000) {
    sessionStorage.removeItem('icv_access');
    sessionStorage.removeItem('icv_ts');
    sessionStorage.removeItem('icv_libro');
    return;
  }
  try {
    const code = atob(raw).trim().toUpperCase();
    if (code.startsWith('INF-')) showApp();
  } catch(e) {}
}

async function doLogin() {
  const input = document.getElementById('auth-code');
  const err   = document.getElementById('auth-error');
  const btn   = document.querySelector('#auth-overlay button');
  const code  = input.value.trim().toUpperCase();

  if (!code) { err.textContent = 'Inserisci il codice di accesso.'; return; }
  if (!code.startsWith('INF-')) {
    err.textContent = 'Codice non valido per questo contenuto (deve iniziare con INF-).';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verifica in corso…';
  err.textContent = '';

  let deviceId = localStorage.getItem('icv_device_id');
  if (!deviceId) {
    deviceId = crypto.randomUUID();
    localStorage.setItem('icv_device_id', deviceId);
  }

  try {
    const res = await fetch('/verify-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, deviceId })
    });
    const data = await res.json();

    if (res.ok && data.valid) {
      sessionStorage.setItem('icv_access', btoa(code));
      sessionStorage.setItem('icv_ts', Date.now().toString());
      sessionStorage.setItem('icv_libro', 'divina-commedia');
      showApp();
    } else {
      err.textContent = data.message || 'Codice non riconosciuto.';
      btn.disabled = false;
      btn.textContent = 'ENTRA NEL POEMA';
    }
  } catch(e) {
    err.textContent = 'Errore di connessione. Riprova.';
    btn.disabled = false;
    btn.textContent = 'ENTRA NEL POEMA';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('auth-code');
  if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});

function showApp() {
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  buildRazioni();
  renderPara('1');
}

// ── PARAGRAPH RENDERER ───────────────────────
function renderPara(key) {
  key = String(key).trim().toUpperCase().replace(/^§/, '');
  const rawText = PARAGRAPHS[key];
  if (!rawText) {
    document.getElementById('para-content').innerHTML =
      '<p style="color:var(--text-dim);font-style:italic;margin-top:2rem">⚠ Paragrafo §' + esc(key) + ' non trovato nel testo.</p>';
    currentPara = key;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  currentPara = key;
  if (!visitedStatChanges.has(key)) {
    visitedStatChanges.add(key);
    applyStatChanges(rawText, key);
  }

  const lines = rawText.split('\n');
  const titleLine = lines[0] ? lines[0].trim() : '';
  const rest = lines.slice(1).join('\n');

  // Separate choices
  const choiceRegex = /^👉.+/;
  const choiceLines = [];
  const bodyChunks = [];
  let currentChunk = [];

  for (const line of rest.split('\n')) {
    if (choiceRegex.test(line.trim())) {
      if (currentChunk.length) { bodyChunks.push(currentChunk.join('\n')); currentChunk = []; }
      choiceLines.push(line.trim());
    } else {
      currentChunk.push(line);
    }
  }
  if (currentChunk.length) bodyChunks.push(currentChunk.join('\n'));

  let html = '<div class="para-header">'
    + '<span class="para-number">§' + esc(key) + '</span>'
    + (titleLine ? '<span class="para-title">' + esc(titleLine) + '</span>' : '')
    + '</div>';

  html += '<div class="para-body">';
  for (const chunk of bodyChunks) {
    const paragraphs = chunk.split(/\n\n+/);
    for (const p of paragraphs) {
      const t = p.trim();
      if (!t) continue;
      html += renderBlock(t);
    }
  }
  html += '</div>';

  if (choiceLines.length > 0) {
    html += '<div class="choices-block">';
    for (const c of choiceLines) html += renderChoice(c);
    html += '</div>';
  }

  document.getElementById('para-content').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderBlock(text) {
  // Stat change line(s)
  if (/^[❤️⭐🧠⚔️🍞]/.test(text) && /[+\-]\d/.test(text)) {
    const isPos = /\+\d/.test(text);
    const isNeg = /\-\d/.test(text) && !/\+\d/.test(text);
    const cls = isPos ? 'pos' : isNeg ? 'neg' : '';
    return '<p>' + text.split('\n').map(l => {
      const lPos = /\+\d/.test(l);
      const lNeg = /\-\d/.test(l) && !/\+\d/.test(l);
      const lCls = lPos ? 'pos' : lNeg ? 'neg' : '';
      return '<span class="stat-change ' + lCls + '">' + esc(l) + '</span>';
    }).join('<br>') + '</p>';
  }

  // Proof box
  if (/^(?:⚔️|🧠)\s*PROVA/i.test(text) || /^PROVA DI/i.test(text)) {
    return '<div class="proof-box"><span class="box-label">PROVA</span>'
      + text.split('\n').map(l => esc(l)).join('<br>') + '</div>';
  }

  // Combat block
  if (/^(?:⚠️?\s*COMBATTIMENTO|NEMICO:|HP:|DANNO:)/i.test(text)) {
    return '<div class="combat-box"><span class="box-label">⚔ COMBATTIMENTO</span>'
      + text.split('\n').map(l => esc(l)).join('<br>') + '</div>';
  }

  // Warning line
  if (/^⚠️/.test(text)) {
    return '<div class="combat-box">' + text.split('\n').map(l => esc(l)).join('<br>') + '</div>';
  }

  // Multi-line block
  if (text.includes('\n')) {
    const lns = text.split('\n');
    // If block looks like a table (pipe separated)
    if (lns.some(l => l.includes('|'))) {
      return '<div class="proof-box" style="font-size:0.85rem">'
        + lns.map(l => esc(l)).join('<br>') + '</div>';
    }
    return '<p>' + lns.map(l => esc(l)).join('<br>') + '</p>';
  }

  return '<p>' + esc(text) + '</p>';
}

function renderChoice(choiceText) {
  const m = choiceText.match(/👉\s*(.*?)(?:vai a|Vai a)\s*§(\d+[A-Za-z]*)/i);
  if (m) {
    let label = m[1].trim().replace(/^Se\s+/i, '').replace(/,?\s*$/, '').replace(/,$/, '');
    if (!label) label = 'Prosegui';
    const paraNum = m[2];
    return '<a class="nav-choice" onclick="navigate(\'' + paraNum.replace(/'/g, "\\'") + '\')">👉 '
      + esc(label) + '<span class="para-ref">&rarr; §' + esc(paraNum) + '</span></a>';
  }
  // Fallback: extract any §N reference
  const ref = choiceText.match(/§(\d+[A-Za-z]*)/);
  const label = choiceText.replace(/👉\s*/, '').replace(/vai a §\d+[A-Za-z]*/gi, '').trim();
  if (ref) {
    return '<a class="nav-choice" onclick="navigate(\'' + ref[1].replace(/'/g,"\\'")+'\')">'
      + '👉 ' + esc(label || 'Prosegui') + '<span class="para-ref">&rarr; §' + esc(ref[1]) + '</span></a>';
  }
  return '<p style="color:var(--gold-dim)">' + esc(choiceText) + '</p>';
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── NAVIGATION ───────────────────────────────
function navigate(key) {
  navHistory.push(currentPara);
  renderPara(key);
}

function goBack() {
  if (!navHistory.length) return;
  const prev = navHistory.pop();
  visitedStatChanges.delete(currentPara);
  renderPara(prev);
}

function gotoParaInput() {
  const v = document.getElementById('goto-input').value.trim();
  if (!v) return;
  navigate(v);
  document.getElementById('goto-input').value = '';
}

// ── STAT CHANGES ─────────────────────────────
const STAT_RE = [
  { re: /❤️s*RESISTENZAs*([+-]d+)/g, stat: 'resistenza' },
  { re: /⭐s*MORALEs*([+-]d+)/g, stat: 'morale' },
  { re: /🧠s*PSICHEs*([+-]d+)/g, stat: 'psiche' },
  { re: /⚔️s*FORZAs*([+-]d+)/g, stat: 'forza' },
  { re: /🍞s*RAZIONIs*([+-]d+)/g, stat: 'razioni' },
];

function applyStatChanges(text, paraKey) {
  for (const { re, stat } of STAT_RE) {
    re.lastIndex = 0;
    let m;
    while ((m = re.exec(text)) !== null) {
      const delta = parseInt(m[1], 10);
      changeStat(stat, delta, paraKey);
    }
  }
}

function changeStat(stat, delta, src) {
  stats[stat] = Math.max(0, stats[stat] + delta);
  if (stat === 'resistenza') stats.resistenza = Math.min(stats.resistenzaMax, stats.resistenza);
  const sign = delta > 0 ? '+' : '';
  addLog(sign + delta + ' ' + stat.toUpperCase() + ' (§' + src + ')', delta > 0 ? 'pos' : 'neg');
  updateStatDisplay(stat);
  flashRow(stat);
}

function adjustStat(stat, delta) {
  stats[stat] = Math.max(0, stats[stat] + delta);
  if (stat === 'resistenza') stats.resistenza = Math.min(stats.resistenzaMax, stats.resistenza);
  if (stat === 'razioni') buildRazioni();
  updateStatDisplay(stat);
}

function updateStatDisplay(stat) {
  const el = document.getElementById('val-' + stat);
  if (!el) return;
  el.textContent = stats[stat];
  el.className = 'stat-val';
  if (stat === 'resistenza') {
    const pct = stats.resistenzaMax > 0 ? (stats.resistenza / stats.resistenzaMax) * 100 : 0;
    document.getElementById('res-bar-fill').style.width = pct + '%';
    if (pct <= 25) el.classList.add('damaged');
    else if (pct <= 50) el.classList.add('low');
  }
  if (stat === 'morale' && stats.morale <= 2) el.classList.add('damaged');
  if (stat === 'razioni') buildRazioni();
}

function flashRow(stat) {
  const row = document.getElementById('row-' + stat);
  if (!row) return;
  row.classList.remove('flash');
  void row.offsetWidth;
  row.classList.add('flash');
}

// ── RAZIONI ───────────────────────────────────
function buildRazioni() {
  const container = document.getElementById('razioni-icons');
  if (!container) return;
  const MAX_SLOTS = 5;
  let html = '';
  for (let i = 0; i < MAX_SLOTS; i++) {
    const active = i < stats.razioni;
    html += '<span class="razione' + (active ? '' : ' used') + '"'
      + ' title="' + (active ? 'Usa razione (+4 Resistenza)' : 'Aggiungi razione') + '"'
      + ' onclick="toggleRazione(' + i + ')">🍞</span>';
  }
  container.innerHTML = html;
}

function toggleRazione(i) {
  if (i < stats.razioni) {
    if (stats.razioni <= 0) { addLog('Nessuna razione rimasta!', 'neg'); return; }
    stats.razioni--;
    stats.resistenza = Math.min(stats.resistenzaMax, stats.resistenza + 4);
    updateStatDisplay('resistenza');
    buildRazioni();
    save();
    addLog('Razione consumata (+4 Resistenza)', 'pos');
  } else {
    stats.razioni++;
    buildRazioni();
    save();
    addLog('Razione aggiunta — totale: ' + stats.razioni, 'pos');
  }
}

// ── DADO ──────────────────────────────────────
function rollTavola() {
  const r = Math.floor(Math.random() * 10) + 1;
  document.getElementById('roll-result').textContent = 'Risultato: ' + r;
}

// ── LOG ───────────────────────────────────────
function addLog(text, cls) {
  logEntries.unshift({ text, cls });
  if (logEntries.length > 40) logEntries.pop();
  const el = document.getElementById('log-list');
  if (!el) return;
  el.innerHTML = logEntries.map(e =>
    '<div class="log-entry ' + (e.cls || '') + '">' + esc(e.text) + '</div>'
  ).join('');
}

// ── START ─────────────────────────────────────
checkAuth();
</script>
