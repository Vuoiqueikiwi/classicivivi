<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFERNO 2026 – Librogame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --bg3: #141414;
  --gold: #C9A84C;
  --gold-dim: #8a6e2e;
  --gold-light: #e8c96c;
  --text: #F5E6C8;
  --text-dim: #9a8a6a;
  --red: #c04040;
  --green: #5a9a5a;
  --border: #2a2010;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'EB Garamond', serif;
  font-size: 18px;
  line-height: 1.7;
  min-height: 100vh;
}

/* AUTH */
#auth-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, #100d00 0%, #080808 70%);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
#auth-overlay.hidden { display: none; }
.auth-box {
  background: var(--bg3);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 3rem 3.5rem;
  max-width: 420px; width: 90%;
  box-shadow: 0 0 60px rgba(201,168,76,0.12);
  text-align: center;
}
.auth-box h1 {
  font-family: 'Cinzel', serif;
  font-size: 1.6rem; color: var(--gold);
  letter-spacing: 0.15em; margin-bottom: 0.3rem;
}
.auth-box .subtitle {
  font-style: italic; color: var(--text-dim);
  font-size: 0.95rem; margin-bottom: 2rem;
}
.auth-box label {
  display: block; text-align: left;
  font-size: 0.78rem; font-family: 'Cinzel', serif;
  color: var(--gold-dim); letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 0.4rem;
}
.auth-box input {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border); border-radius: 2px;
  color: var(--text); font-family: 'EB Garamond', serif;
  font-size: 1rem; padding: 0.6rem 0.8rem;
  margin-bottom: 1.2rem; outline: none;
  transition: border-color 0.2s;
}
.auth-box input:focus { border-color: var(--gold-dim); }
.auth-box button {
  width: 100%;
  background: linear-gradient(135deg, #2a1e00, #1a1400);
  border: 1px solid var(--gold); color: var(--gold);
  font-family: 'Cinzel', serif; font-size: 0.88rem;
  letter-spacing: 0.15em; padding: 0.85rem;
  cursor: pointer; border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
}
.auth-box button:hover {
  background: linear-gradient(135deg, #3d2c00, #2a1e00);
  box-shadow: 0 0 18px rgba(201,168,76,0.25);
}
.auth-error {
  color: var(--red); font-size: 0.85rem;
  margin-top: 0.8rem; min-height: 1.3em; font-style: italic;
}

/* LAYOUT */
#app { display: flex; min-height: 100vh; }
#app.hidden { display: none; }

/* SIDEBAR */
#sidebar {
  width: 270px; min-width: 270px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; overflow-x: hidden;
  padding: 1.4rem 1.1rem;
  display: flex; flex-direction: column; gap: 0;
}
.sidebar-title {
  font-family: 'Cinzel', serif;
  font-size: 0.68rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gold);
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem; margin-bottom: 1rem;
}

/* Character sheet */
.scheda {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 3px; padding: 0.9rem; margin-bottom: 1.4rem;
}
.scheda-name {
  font-family: 'Cinzel', serif; font-size: 0.72rem;
  letter-spacing: 0.15em; color: var(--gold);
  text-align: center; margin-bottom: 0.7rem;
  text-transform: uppercase;
}
.stat-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0.28rem 0;
  border-bottom: 1px solid #161005;
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-dim); font-size: 0.84rem; font-family: 'Cinzel', serif; letter-spacing: 0.04em; }
.stat-val {
  font-family: 'Cinzel', serif; font-size: 1.02rem;
  color: var(--gold); font-weight: 600; min-width: 2rem; text-align: right;
}
.stat-val.damaged { color: var(--red); }
.stat-val.low { color: #c08030; }
.stat-controls { display: flex; gap: 4px; align-items: center; }
.stat-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer;
  width: 19px; height: 19px; font-size: 0.68rem;
  border-radius: 2px; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, color 0.15s;
}
.stat-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

.res-bar-wrap { margin: 0.3rem 0 0.1rem; }
.res-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.res-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), #e05050);
  transition: width 0.4s; border-radius: 3px;
}

.razioni-icons { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 0.3rem; }
.razione { font-size: 0.95rem; cursor: pointer; opacity: 1; transition: opacity 0.2s; user-select: none; }
.razione.used { opacity: 0.2; }

@keyframes statFlash {
  0% { background: rgba(201,168,76,0.25); }
  100% { background: transparent; }
}
.stat-row.flash { animation: statFlash 0.9s ease-out; border-radius: 2px; }

.roll-result {
  text-align: center; font-family: 'Cinzel', serif;
  font-size: 1.15rem; color: var(--gold);
  margin-bottom: 0.7rem; min-height: 1.7em;
}
/* Log */
.log-section { margin-top: auto; padding-top: 1rem; }
.log-title {
  font-family: 'Cinzel', serif; font-size: 0.62rem;
  letter-spacing: 0.15em; color: var(--text-dim);
  text-transform: uppercase; margin-bottom: 0.35rem;
}
.log-list {
  font-size: 0.73rem; color: var(--text-dim);
  max-height: 110px; overflow-y: auto; font-style: italic;
}
.log-entry { padding: 0.12rem 0; border-bottom: 1px solid #111; }
.log-entry.pos { color: #7ab07a; }
.log-entry.neg { color: #b07070; }

/* MAIN */
#main {
  flex: 1; display: flex; flex-direction: column;
  max-width: 820px; margin: 0 auto;
  padding: 3rem 2.5rem;
}
.book-header {
  text-align: center; margin-bottom: 3rem;
  border-bottom: 1px solid var(--border); padding-bottom: 2rem;
}
.book-title {
  font-family: 'Cinzel', serif; font-size: 2.3rem;
  letter-spacing: 0.15em; color: var(--gold);
  text-shadow: 0 0 40px rgba(201,168,76,0.25); margin-bottom: 0.3rem;
}
.book-subtitle { font-style: italic; color: var(--text-dim); font-size: 1rem; }

.para-header {
  display: flex; align-items: baseline;
  gap: 1rem; margin-bottom: 1.5rem;
}
.para-number {
  font-family: 'Cinzel', serif; font-size: 2.6rem;
  color: var(--gold); font-weight: 700; line-height: 1;
  text-shadow: 0 0 20px rgba(201,168,76,0.2);
}
.para-title {
  font-family: 'Cinzel', serif; font-size: 1.08rem;
  color: var(--text-dim); letter-spacing: 0.06em;
}
.para-body { font-size: 1.05rem; line-height: 1.88; }
.para-body p { margin-bottom: 0.9em; }

.stat-change {
  display: inline-block; padding: 0.18rem 0.6rem;
  border-left: 3px solid var(--gold-dim);
  background: rgba(201,168,76,0.06);
  border-radius: 0 2px 2px 0;
  font-size: 0.9rem; color: var(--gold-dim);
  margin: 0.15rem 0; font-style: italic;
}
.stat-change.neg { border-left-color: var(--red); background: rgba(192,64,64,0.06); color: #c07070; }
.stat-change.pos { border-left-color: var(--green); background: rgba(90,154,90,0.06); color: #7ab07a; }

.nav-choice {
  display: block; padding: 0.65rem 1.1rem;
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold-dim);
  background: var(--bg2); color: var(--gold);
  text-decoration: none;
  font-family: 'EB Garamond', serif; font-size: 1rem;
  margin-bottom: 0.55rem; cursor: pointer;
  border-radius: 0 3px 3px 0;
  transition: background 0.18s, border-left-color 0.18s, box-shadow 0.18s;
  font-style: italic;
}
.nav-choice:hover {
  background: #1a1200; border-left-color: var(--gold);
  box-shadow: inset 0 0 0 1px rgba(201,168,76,0.08);
}
.nav-choice .para-ref {
  font-family: 'Cinzel', serif; font-style: normal;
  font-size: 0.82rem; color: var(--gold-dim); margin-left: 0.5rem;
}
.choices-block {
  margin-top: 1.8rem; border-top: 1px solid var(--border); padding-top: 1.4rem;
}

.proof-box {
  background: var(--bg3); border: 1px solid var(--border);
  border-left: 3px solid var(--gold-dim);
  padding: 0.75rem 1rem; margin: 0.75rem 0;
  border-radius: 0 3px 3px 0; font-size: 0.93rem;
}
.proof-box .box-label {
  font-family: 'Cinzel', serif; font-size: 0.75rem;
  color: var(--gold); letter-spacing: 0.1em;
  display: block; margin-bottom: 0.3rem;
}
.combat-box {
  background: #0d0500; border: 1px solid #3a1010;
  border-left: 3px solid var(--red);
  padding: 0.75rem 1rem; margin: 0.75rem 0;
  border-radius: 0 3px 3px 0; font-size: 0.92rem;
}
.combat-box .box-label {
  font-family: 'Cinzel', serif; font-size: 0.75rem;
  color: var(--red); letter-spacing: 0.1em;
  display: block; margin-bottom: 0.3rem;
}

.para-nav {
  display: flex; gap: 0.5rem; margin-bottom: 2rem;
  flex-wrap: wrap; align-items: center;
}
.back-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-family: 'Cinzel', serif;
  font-size: 0.73rem; letter-spacing: 0.08em;
  padding: 0.38rem 0.8rem; cursor: pointer;
  border-radius: 2px; transition: border-color 0.2s, color 0.2s;
}
.back-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
.goto-form { display: flex; gap: 0.4rem; margin-left: auto; align-items: center; }
.goto-prefix { font-size: 0.75rem; color: var(--text-dim); font-family: 'Cinzel', serif; letter-spacing: 0.05em; }
.goto-form input {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); font-family: 'Cinzel', serif;
  font-size: 0.78rem; padding: 0.35rem 0.55rem;
  width: 65px; border-radius: 2px; outline: none;
}
.goto-form input:focus { border-color: var(--gold-dim); }
.goto-form button {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-family: 'Cinzel', serif;
  font-size: 0.73rem; letter-spacing: 0.08em;
  padding: 0.35rem 0.7rem; cursor: pointer;
  border-radius: 2px; transition: border-color 0.2s, color 0.2s;
}
.goto-form button:hover { border-color: var(--gold-dim); color: var(--gold); }

.section-label {
  font-family: 'Cinzel', serif; font-size: 0.82rem;
  letter-spacing: 0.1em; color: var(--text-dim);
  text-transform: uppercase; margin-bottom: 0.2rem;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

@media (max-width: 768px) {
  #app { flex-direction: column; }
  #sidebar {
    width: 100%; height: auto; position: relative;
    flex-direction: row; flex-wrap: wrap; gap: 0.8rem; padding: 1rem;
  }
  .scheda { flex: 1; min-width: 200px; }
  .log-section { display: none; }
  #main { padding: 1.5rem 1rem; }
  .para-number { font-size: 1.8rem; }
}
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-box">
    <h1>INFERNO 2026</h1>
    <p class="subtitle">Nel mezzo del cammin di nostra vita</p>
    <div style="margin-bottom:1rem">
      <label>Codice di accesso</label>
      <input type="text" id="auth-code" placeholder="INF-XXXX-XXXX" autocomplete="off"
             style="text-transform:uppercase;letter-spacing:0.05em">
    </div>
    <button onclick="doLogin()">ENTRA NEL POEMA</button>
    <div class="auth-error" id="auth-error"></div>
    <p style="margin-top:1.5rem;font-size:0.72rem;color:var(--text-dim);font-style:italic">
      Accesso riservato — I Classici Vivi
    </p>
  </div>
</div>

<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-title">Scheda Personaggio</div>
    <div class="scheda">
      <div class="scheda-name">Il Viandante</div>
      <div class="stat-row" id="row-forza">
        <span class="stat-label">⚔️ Forza</span>
        <div class="stat-controls">
          <button class="stat-btn" onclick="adjustStat('forza',-1)">−</button>
          <span class="stat-val" id="val-forza">12</span>
          <button class="stat-btn" onclick="adjustStat('forza',1)">+</button>
        </div>
      </div>
      <div class="stat-row" id="row-psiche">
        <span class="stat-label">🧠 Psiche</span>
        <div class="stat-controls">
          <button class="stat-btn" onclick="adjustStat('psiche',-1)">−</button>
          <span class="stat-val" id="val-psiche">12</span>
          <button class="stat-btn" onclick="adjustStat('psiche',1)">+</button>
        </div>
      </div>
      <div class="stat-row" id="row-resistenza">
        <span class="stat-label">❤️ Resistenza</span>
        <div class="stat-controls">
          <button class="stat-btn" onclick="adjustStat('resistenza',-1)">−</button>
          <span class="stat-val" id="val-resistenza">24</span>
          <button class="stat-btn" onclick="adjustStat('resistenza',1)">+</button>
        </div>
      </div>
      <div class="res-bar-wrap">
        <div class="res-bar"><div class="res-bar-fill" id="res-bar-fill" style="width:100%"></div></div>
      </div>
      <div class="stat-row" id="row-morale">
        <span class="stat-label">⭐ Morale</span>
        <div class="stat-controls">
          <button class="stat-btn" onclick="adjustStat('morale',-1)">−</button>
          <span class="stat-val" id="val-morale">7</span>
          <button class="stat-btn" onclick="adjustStat('morale',1)">+</button>
        </div>
      </div>
      <div class="stat-row" style="flex-direction:column;align-items:flex-start;gap:0.3rem;padding-top:0.4rem">
        <span class="stat-label">🍞 Razioni</span>
        <div class="razioni-icons" id="razioni-icons"></div>
      </div>
    </div>

    <div class="roll-result" id="roll-result"></div>

    <div class="log-section">
      <div class="log-title">Registro eventi</div>
      <div class="log-list" id="log-list"></div>
    </div>
  </aside>

  <main id="main">
    <div class="book-header">
      <div class="book-title">INFERNO 2026</div>
      <div class="book-subtitle">Nel mezzo del cammin di nostra vita — Librogame interattivo</div>
    </div>
    <div class="para-nav">
      <button class="back-btn" onclick="goBack()">← Indietro</button>
      <div class="goto-form">
        <span class="goto-prefix">§</span>
        <input type="text" id="goto-input" placeholder="N°" maxlength="5"
               onkeydown="if(event.key==='Enter')gotoParaInput()">
        <button onclick="gotoParaInput()">Vai</button>
      </div>
    </div>
    <div id="para-content"></div>
  </main>
</div>

<script>
const PARAGRAPHS = {"1":"La notte della selva\n\nL'estate del 2026 stava finendo troppo in fretta.\n\nLa vacanza con i tuoi amici doveva essere l'ultimo spazio di libertà. Invece settembre era arrivato, e con lui la prima interrogazione importante: Dante, Inferno, Canto I.\n\nNaturalmente non avevi studiato.\n\nOra sei seduto sul balcone della casa al mare, notte fonda, libro aperto. Fuori il mare respira. Dentro, solo silenzio.\n\nInizi a leggere. Le prime righe ti scorrono davanti pesanti. La selva. Lo smarrimento. Poi la stanchezza vince.\n\nAlzi gli occhi.\n\nIl balcone non c'è più.\n\nSei in piedi su un terreno umido, circondato da alberi altissimi e contorti. L'aria sa di terra bagnata e di chiuso. Il telefono segna le 23:47, ma non c'è campo.\n\n👉 Se tenti di raggiungere il colle illuminato in lontananza, vai a §2\n👉 Se entri nella selva per cercare un passaggio, vai a §3\n👉 Se riapri il libro per controllare ciò che hai appena letto, vai a §4","2":"Verso il colle\n\nTi muovi subito verso il colle.\n\nLa pendenza non è impossibile, ma il terreno cede sotto le scarpe. La luce lontana ti dà un fragile senso di orientamento. Agire, anche senza capire, è meglio che restare fermo.\n\nLa selva ti resta accanto come una presenza vigile. Non ti tocca, ma non ti perde di vista.\n\nUna voce sussurra tra i rami: \"Non sarà sempre così facile.\"\n\nSenti un brivido sulla nuca.\n\n👉 Se acceleri il passo verso il colle, vai a §5\n👉 Se procedi con cautela osservando l'ambiente, vai a §6","3":"Nella selva\n\nEntri nella selva.\n\nDopo pochi passi il mondo cambia. Il terreno si fa più molle, i rami più bassi, l'aria più pesante. Il silenzio è pieno di piccoli rumori che non sai distinguere.\n\nA un tratto perdi il riferimento del colle.\n\nUn fruscio alle tue spalle. Qualcosa si muove tra le foglie.\n\n👉 Se ti volti di scatto, vai a §7\n👉 Se resti immobile e trattieni il respiro, vai a §8\n👉 Se scatti in avanti senza voltarti, vai a §9","4":"Riaprire il libro\n\nRiapri il libro con mani meno ferme di quanto vorresti.\n\nLe parole sono ancora lì. La selva. La via smarrita. Il colle illuminato. Più leggi, più lo spazio intorno a te sembra rispondere al testo.\n\nUn ramo si spezza alle tue spalle.\n\nTi volti di scatto.\n\nUn'ombra si ritrae tra gli alberi.\n\nNon sei solo.\n\n👉 Se chiami \"Chi c'è?\", vai a §10\n👉 Se resti in silenzio e osservi, vai a §11\n👉 Se chiudi il libro e ti allontani di corsa, vai a §12","5":"Accelerare verso il colle\n\nAcceleri il passo. Il fiato si fa corto, ma la luce del colle sembra avvicinarsi.\n\nPoi il terreno frana sotto il piede sinistro. Una voragine si apre davanti a te.\n\nDevi saltare.\n\n⚔️ PROVA DI FORZA – Soglia 10\nTira 1D10 + FORZA (12)\n\n👉 Se SUPERI, atterri dall'altra parte. Vai a §13\n👉 Se FALLISCI, cadi nella voragine. Vai a §14","6":"Procedere con cautela\n\nProcedi con cautela, osservando ogni radice, ogni movimento tra gli alberi.\n\nLa prudenza ti salva da una caduta. Ma la selva si fa più fitta intorno a te, come se stesse cercando di chiuderti dentro.\n\nIl colle sembra allontanarsi.\n\n🧠 PROVA DI PSICHE – Soglia 12\nTira 1D10 + PSICHE (12)\n\n👉 Se SUPERI, trovi un varco e esci dalla selva. Vai a §15\n👉 Se FALLISCI, la selva ti disorienta. Vai a §16","7":"Voltarsi di scatto\n\nTi volti di scatto.\n\nUna creatura strisciante, coperta di fango e radici, ti sta puntando. I suoi occhi sono due buchi neri. La bocca è una fessura che stilla melma.\n\nTi vede. Si blocca.\n\nPoi si avventa.\n\n⚠️ COMBATTIMENTO – Strisciante del Rinvio\n\n👉 Vai a §17","8":"Restare immobile\n\nResti immobile. Trattieni il respiro.\n\nIl fruscio si avvicina. Qualcosa ti sfiora la caviglia. Poi si allontana.\n\nLa creatura non ti ha visto. O forse non gli interessi.\n\nAspetti un lungo minuto. Poi, quando il silenzio torna completo, riprendi a camminare.\n\nLa selva davanti a te è più chiara. Il colle è visibile.\n\n❤️ RESISTENZA -1 → ora 23\n\n👉 Vai a §18","9":"Scattare in avanti\n\nScatti in avanti senza voltarti.\n\nCorri tra gli alberi senza guardare indietro. I rami ti frustano il volto. Le radici ti fanno inciampare due volte.\n\nDopo qualche minuto sei esausto. Ti appoggi a un tronco.\n\nIl colle è sparito. La selva ti ha inghiottito.\n\n❤️ RESISTENZA -2 → ora 22\n⭐ MORALE -1 → ora 6\n\n👉 Se cerchi di orientarti con il telefono, vai a §19\n👉 Se ti siedi e aspetti, vai a §20","10":"\"Chi c'è?\"\n\n\"Chi c'è?\" chiedi.\n\nIl silenzio risponde per lunghi secondi. Poi una voce, roca e lontana:\n\n\"Nessuno che tu voglia incontrare.\"\n\nUn ramo si muove. L'ombra si allontana.\n\nIl libro che tieni in mano è ancora aperto. Le parole sembrano muoversi sulla pagina.\n\n👉 Se insegui l'ombra, vai a §21\n👉 Se resti fermo e rileggi il libro, vai a §22\n👉 Se ti allontani nella direzione opposta, vai a §23","11":"Restare in silenzio\n\nResti immobile. Trattieni il respiro.\n\nL'ombra tra gli alberi non si muove. Vi osservate a vicenda per un tempo che sembra eterno.\n\nPoi l'ombra parla:\n\n\"Non sei ancora pronto. Torna indietro.\"\n\nIl consiglio suona come una minaccia.\n\n👉 Se obbedisci e torni verso il punto di partenza, vai a §24\n👉 Se ignori l'avvertimento e avanzi, vai a §25","12":"Allontanarsi di corsa\n\nTi allontani di corsa.\n\nNon sai dove. Non sai perché. Corri e basta.\n\nI rami ti frustano il volto. Le radici ti fanno inciampare tre volte. La selva sembra muoversi con te, contro di te.\n\nDopo una corsa folle, sei esausto. Ti appoggi a un tronco.\n\nIl colle è sparito. La selva ti ha inghiottito.\n\n❤️ RESISTENZA -3 → ora 21\n⭐ MORALE -1 → ora 6\n\n👉 Se cerchi di orientarti, vai a §26\n👉 Se ti siedi e aspetti l'alba, vai a §27","13":"Salto riuscito\n\nAtterri dall'altra parte della voragine, rotoli, ti rialzi. Il cuore batte all'impazzata, ma sei salvo.\n\nDavanti a te, il colle è vicinissimo. La luce che lo illumina non è del sole. È più calda. Più umana.\n\nUna figura si staglia contro quella luce.\n\n👉 Se ti avvicini lentamente alla figura, vai a §30\n👉 Se chiami \"Chi sei?\", vai a §30","14":"Caduta\n\nNon ce la fai. I piedi non arrivano all'altro bordo.\n\nCadi. Atterri su un letto di foglie marce e radici. Il dolore alla caviglia è immediato.\n\n❤️ RESISTENZA -4 → ora 20\n\nSei in una piccola gola, nascosta tra gli alberi. Sopra di te, il bordo del dirupo è troppo alto per risalire senza aiuto.\n\nDevi trovare un'altra via.\n\n👉 Se esplori la gola verso destra, vai a §30\n👉 Se esplori verso sinistra, vai a §31","15":"Trovato il varco\n\nRiesci a mantenere la calma. La selva preme su di te, ma la tua mente resta lucida. Vedi un varco tra i tronchi che prima non c'era.\n\nLo prendi.\n\nDopo pochi passi, esci dalla parte più fitta del bosco.\n\nDavanti a te, il colle. E sulla sua pendenza, una figura che ti osserva.\n\n🧠 PSICHE +1 → ora 13\n\n👉 Se ti avvicini alla figura, vai a §32\n👉 Se aspetti che sia lei a muoversi, vai a §33","16":"Disorientato\n\nLa paura prende il sopravvento.\n\nLa selva ti disorienta. Giri su te stesso, avanzi senza guadagnare terreno. Ogni albero sembra uguale al precedente.\n\nQuando finalmente esci dalla parte più fitta, sei esausto e confuso.\n\n❤️ RESISTENZA -2 → ora 22\n\nIl colle è lontano. Molto più lontano di prima.\n\n👉 Se ti riposi qualche minuto prima di proseguire, vai a §34\n👉 Se prosegui subito verso il colle, vai a §35","17":"COMBATTIMENTO: Strisciante del Rinvio\n\nLa creatura strisciante si avventa su di te.\n\nNEMICO: Strisciante del Rinvio\nHP: 8\nDANNO: 2❤️ per round\nDEBOLEZZA: La luce (se hai il telefono, puoi accecarlo)\n\nOPZIONI (scegli una per round):\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2)\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2) – poco efficace\n🛡️ Schivata (danno dimezzato a 1❤️)\n📱 Usa il telefono (acceca la creatura per 2 round)\n\n👉 Se VINCI, vai a §36\n👉 Se PERDI (RESISTENZA ≤ 0), vai a §37","18":"Uscita dalla selva\n\nCammini per qualche minuto. Gli alberi si diradano.\n\nIl colle è davanti a te. Sulla sua pendenza, una figura si staglia contro la luce.\n\nNon sei ferito, ma la tensione ti ha consumato.\n\n❤️ RESISTENZA -1 → ora 23\n\n👉 Se ti avvicini alla figura, vai a §30\n👉 Se aspetti che sia lei a muoversi, vai a §33","19":"Orientarsi con il telefono\n\nAccendi il telefono. Lo schermo illumina il buio.\n\nNessun campo. Nessun GPS. Solo l'orologio: 23:52.\n\nMa la luce ti aiuta a vedere meglio. Trovi un sentiero poco visibile tra i tronchi.\n\nLo segui.\n\nDopo pochi minuti, esci dalla selva. Il colle è lontano, ma visibile.\n\n📱 Il telefono si spegne. Batteria esaurita.\n\n👉 Vai a §40","20":"Sedersi e aspettare\n\nTi siedi con la schiena contro un tronco.\n\nIl buio è totale. Il silenzio anche.\n\nAspetti. Minuti che sembrano ore.\n\nPoi, lentamente, una luce grigiastra comincia a filtrare tra gli alberi. Non è l'alba. È diversa. Più fredda.\n\nTi alzi. La selva intorno a te è cambiata. È più vecchia. Più morta.\n\nIl colle è sparito. Davanti a te si apre una radura con una porta di pietra.\n\n⭐ MORALE -1 → ora 6\n❤️ RESISTENZA -1 → ora 23\n\n👉 Vai a §41","21":"Inseguire l'ombra\n\nInsegui l'ombra.\n\nSi muove veloce tra gli alberi, sempre un passo avanti a te. A volte ti sembra di poterla raggiungere. Poi sparisce.\n\nDopo una corsa folle, ti ritrovi in una radura.\n\nL'ombra non c'è più.\n\nAl centro della radura, una porta di pietra. Sull'architrave, parole incise.\n\n\"LASCIATE OGNI SPERANZA, VOI CH'ENTRATE\"\n\n⭐ MORALE -1 → ora 6\n\n👉 Se leggi le parole ad alta voce, vai a §22\n👉 Se cerchi un modo di aggirare la porta, vai a §23\n👉 Se ti giri e torni indietro, vai a §24","22":"La porta di pietra\n\nLeggi le parole ad alta voce: \"Lasciate ogni speranza, voi ch'entrate\".\n\nLa voce rimbomba tra gli alberi. Per un attimo tutto tace.\n\nPoi la porta si apre da sola. Dall'interno esce un vento freddo, carico di lamenti lontani.\n\n⚠️ Dalla porta escono due ombre. Ti attaccano senza preavviso.\n\nCOMBATTIMENTO – Guardiani della Soglia\n\n👉 Vai a §22B","23":"Entrare nella porta (dopo il combattimento)\n\nLe ombre si dissolvono. Varchi la soglia.\n\nIl buio ti avvolge. Per un istante non vedi nulla. Poi i tuoi occhi si abituano.\n\nSei in una pianura desolata. Cielo nero. Terra bruciata.\n\nUna figura, poco distante, seduta su una pietra.\n\nÈ un uomo. Veste abiti antichi. Il volto è severo, stanco, ma gli occhi sono lucidi.\n\nSi alza quando ti vede.\n\n\"Tu non sei atteso qui,\" dice.\n\n👉 Se chiedi chi sia, vai a §26\n👉 Se resti in silenzio e aspetti che parli, vai a §27","24":"Esitare sulla soglia\n\nResti fermo sulla soglia. Guardi dentro.\n\nIl buio sembra guardarti a sua volta.\n\nUna mano fredda ti afferra il polso. Poi un'altra.\n\n⚠️ COMBATTIMENTO – Mani della Soglia\n\n👉 Vai a §24B","25":"Tornare indietro\n\nTi giri e torni verso la selva. La porta si richiude alle tue spalle.\n\nCammini per minuti che sembrano ore. La selva è più fitta di prima. Più ostile.\n\n⚠️ Un ramo si muove. Non è vento.\n\nCOMBATTIMENTO – Strisciante della Selva\n\n👉 Vai a §25B","26":"\"Chi sei?\"\n\n\"Chi sei?\" chiedi.\n\nL'uomo ti osserva a lungo. Poi risponde:\n\n\"Io sono Dante Alighieri.\"\n\nIl nome ti colpisce come un pugno.\n\n\"Sei vivo,\" continua. \"Eppure sei entrato nel mio cammino.\"\n\nIndica la pianura.\n\n\"Qui comincia la discesa. Puoi seguirmi, o puoi avanzare da solo.\"\n\n⭐ PROVA DI MORALE – Soglia 12\nTira 1D10 + MORALE\n👉 Se SUPERI (≥12), vai a §31 (accetti con fiducia)\n👉 Se FALLISCI (<12), vai a §32 (esiti e rifiuti)","27":"Restare in silenzio\n\nResti in silenzio. Dante aspetta.\n\nPoi parla lui:\n\n\"Hai paura. È normale. Ma la paura non è una guida.\"\n\nIndica la pianura.\n\n\"Qui comincia l'Inferno. Quello vero.\"\n\n\"Vuoi seguirmi?\"\n\n⭐ PROVA DI MORALE – Soglia 10\nTira 1D10 + MORALE\n👉 Se SUPERI (≥10), vai a §31 (accetti)\n👉 Se FALLISCI (<10), vai a §32 (rifiuti)","28":"Nella gola\n\nCammini nella gola. Le pareti di pietra sono alte e scure.\n\nUn'ombra si muove davanti a te.\n\n⚠️ COMBATTIMENTO – Spettro della Gola\n\n👉 Vai a §28B","29":"Sconfitta e fuga\n\nLa creatura ti supera. Cadi a terra. Il dolore è forte.\n\n❤️ RESISTENZA -3 → ora 15\n\nTi rialzi e fuggi. Non sai dove. Corri e basta.\n\nDopo una corsa folle, esci dalla selva.\n\nSei su una riva fangosa. Davanti a te, un fiume nero.\n\n🌊 ACHERONTE\n\n👉 Vai a §33","30":"Sulla collina\n\nLa selva si dirada. Sei su una collina. Il sole non c'è, ma una luce calda illumina il pendio.\n\nUna figura ti aspetta. È Dante.\n\n\"Hai combattuto,\" dice. \"E sei sopravvissuto. Non tutti ci riescono.\"\n\n⭐ MORALE +1 → ora 7\n\n👉 Se chiedi a Dante di guidarti, vai a §31\n👉 Se decidi di scendere da solo, vai a §32","31":"Accettare la guida di Dante\n\n\"Vengo con te,\" dici.\n\nDante annuisce.\n\nTi porge una piccola sacca. Dentro trovi una razione.\n\n🍞 RAZIONE +1 → ora 4\n⭐ MORALE +1 → ora 8\n\n👉 Vai a §36","32":"Rifiutare la guida (proseguire da solo)\n\n\"No. Posso cavarmela da solo.\"\n\nDante ti osserva a lungo.\n\n\"Può darsi,\" dice. \"Ma non qui.\"\n\nPoi arretra. Scompare.\n\n⭐ MORALE -1 → ora 6\n\n👉 Vai a §37","33":"Sulla riva dell'Acheronte\n\nTi avvicini all'acqua.\n\nIl fiume è nero, denso, quasi metallico. Non riflette nulla.\n\nSulla riva si accalcano anime inquiete.\n\nUna barca si avvicina.\n\nCaronte.\n\n\"Guai a voi, anime prave!\" urla. Poi ti vede.\n\n\"E tu, vivo, allontànati.\"\n\n⚠️ Dalla riva, due anime si staccano e ti corrono incontro.\n\nCOMBATTIMENTO – Anime Ignave\n\n👉 Vai a §33B","34":"Dopo il combattimento\n\nLe anime si dissolvono. Caronte ti guarda con occhi nuovi.\n\n\"Non sei uno di loro,\" ringhia. \"Salta.\"\n\n⚔️ PROVA DI FORZA – Soglia 10\nTira 1D10 + FORZA (12)\n\n👉 Se SUPERI, sali sulla barca. Vai a §47\n👉 Se FALLISCI, cadi nell'acqua. Vai a §51","35":"Sconfitto dalle Anime\n\nLe anime ti travolgono. Cadi nella melma della riva.\n\n❤️ RESISTENZA -4 → ora 14\n\nCaronte ride.\n\n\"Non sei pronto, vivo.\"\n\nLa barca si allontana. Resti sulla riva, coperto di fango.\n\n👉 Se ti rialzi e cerchi un'altra barca, vai a §48\n👉 Se resti a terra, vai a §48","36":"Verso l'Acheronte (con Dante)\n\nCammini accanto a Dante. La pianura è desolata.\n\nPoi, davanti a voi, un fiume nero. L'Acheronte.\n\nSulla riva, anime in attesa. E una barca che si avvicina.\n\n\"Preparati,\" dice Dante. \"Caronte non ama i vivi.\"\n\n👉 Se affronti Caronte da solo, vai a §41\n👉 Se lasci parlare Dante, vai a §39","37":"Solo sull'Acheronte (senza Dante)\n\nCammini da solo. Ogni passo è una fatica.\n\nPoi senti l'acqua. Un fiume nero.\n\nSulla riva, anime che piangono. E una barca.\n\nCaronte.\n\n\"Anima viva,\" ringhia, \"cosa ci fai qui?\"\n\n👉 Se rispondi con umiltà, vai a §38\n👉 Se rispondi con sfida, vai a §42\n👉 Se taci, vai a §43\n👉 Se arretri, vai a §44","38":"Rispondere a Caronte\n\n\"Non so come sono arrivato,\" dici.\n\nCaronte solleva il remo.\n\n⚠️ PROVA DI FORZA – Soglia 12\nTira 1D10 + FORZA (12)\n\n👉 Se SUPERI, schivi. Vai a §45\n👉 Se FALLISCI, vieni colpito. Vai a §46","39":"Dante parla per te\n\nPrima che tu possa parlare, Dante si fa avanti.\n\n\"Caronte, non crucciarti. Così è voluto.\"\n\nCaronte ubbidisce.\n\n\"Salite.\"\n\n⭐ MORALE +1 → ora 9\n\n👉 Vai a §47","40":"Arretrare da Caronte\n\nFai un passo indietro. Scivoli.\n\nCaronte ride. Colpisce l'acqua. Un'onda ti investe.\n\n❤️ RESISTENZA -2 → ora 18\n⭐ MORALE -1 → ora 6\n\n👉 Vai a §45","41":"Sulla barca di Caronte (con Dante)\n\nSalite sulla barca. Caronte spinge.\n\nL'acqua è nera. Il silenzio è totale.\n\nPoi, a metà del fiume, qualcosa si muove.\n\n⚠️ MANI DEGLI ACCIDIOSI – COMBATTIMENTO\n\n👉 Vai a §49","42":"Risposta sincera a Caronte\n\n\"Non ho paura di te,\" dici.\n\nCaronte ti fissa.\n\n\"Salta.\"\n\n⚔️ PROVA DI FORZA – Soglia 10\nTira 1D10 + FORZA (12)\n\n👉 Se SUPERI, sali. Vai a §50\n👉 Se FALLISCI, cadi. Vai a §51","43":"Tacere davanti a Caronte\n\nAbbassi lo sguardo.\n\n\"Vile,\" sputa Caronte. Colpisce l'acqua.\n\n❤️ RESISTENZA -3 → ora 17\n⭐ MORALE -1 → ora 5\n\n👉 Vai a §50","44":"Indietreggiare\n\nFai un passo indietro. Poi un altro.\n\nCaronte ride. \"Fuggi pure.\"\n\n❤️ RESISTENZA -1 → ora 18\n⭐ MORALE -2 → ora 4\n\n👉 Vai a §52","45":"Resistere a Caronte\n\nResisti al colpo. Caronte ringhia.\n\n\"Salta.\"\n\nSalti. Atterri sulla barca.\n\n👉 Vai a §47","46":"Colpito da Caronte\n\nIl remo ti colpisce.\n\n❤️ RESISTENZA -4 → ora 16\n\nCadi in ginocchio. La barca si allontana.\n\n👉 Vai a §48","47":"Attraversare l'Acheronte\n\nLa barca scivola. Le anime diventano puntini.\n\nPoi, una nuova riva. E oltre, una città di mura rosse.\n\nDite.\n\n\"Ora comincia il vero viaggio,\" dice Dante.\n\n👉 Vai a §127","48":"Restare a terra\n\nResti sulla riva. La barca è sparita.\n\nPoi, dal buio, un'ombra con una barca più piccola.\n\n\"Salta, se vuoi vivere.\"\n\n⚔️ PROVA DI FORZA – Soglia 8\nTira 1D10 + FORZA (12)\n\n👉 Se SUPERI, sali. Vai a §50\n👉 Se FALLISCI, cadi. Vai a §51","49":"COMBATTIMENTO: Mani degli Accidiosi\n\nDall'acqua emergono mani pallide. Cercano di rovesciare la barca.\n\nNEMICO: Mani degli Accidiosi (sciame)\nHP: 12\nDANNO: 3❤️ per round\nDEBOLEZZA: Colpisci l'acqua (FORZA ≥ 10) → si ritirano per un round\n\nOPZIONI:\n⚔️ Attacco fisico (tira 1D6 + FORZA÷2)\n🧠 Attacco psichico (tira 1D6 + PSICHE÷2)\n🛡️ Schivata (danno dimezzato)\n💧 Colpisci l'acqua (automatico se FORZA ≥ 10)\n\n👉 Se VINCI, vai a §47\n👉 Se PERDI, vai a §51","50":"Salire sulla barca\n\nSalti e atterri sulla barca. Caronte spinge.\n\nL'attraversata è breve.\n\nSull'altra riva, la città di Dite.\n\n\"Sei sopravvissuto,\" dice Dante (se è con te). \"Non tutti ci riescono.\"\n\n⭐ MORALE +1 → ora 7\n\n👉 Vai a §127","51":"Caduta nell'Acheronte\n\nL'acqua nera ti inghiotte.\n\nÈ fredda. Non fredda come quella di un fiume vero. È una freddezza che entra nelle ossa e non ti molla.\n\nCerchi di risalire, ma qualcosa ti afferra le caviglie.\n\n⚠️ COMBATTIMENTO – Annegati dell'Acheronte\n\n👉 Vai a §51B","52":"Riemerso dall'Acheronte\n\nRiesci a liberarti. Risali a fatica. L'acqua nera ti esce dalla bocca, dal naso, dagli occhi.\n\nSei su una riva sconosciuta. Non quella da cui sei partito. L'altra sponda.\n\nDall'altra parte del fiume, Caronte ti guarda. Non dice nulla. Si allontana.\n\nSei solo. Bagnato. Freddo.\n\nDavanti a te, una città di mura rosse.\n\nDite.\n\n❤️ RESISTENZA -2 → ora 14\n⭐ MORALE -1 → ora 5\n\n👉 Vai a §127","53":"Trascinato sul fondo\n\nNon ce la fai. Le mani ti trascinano giù.\n\nL'acqua nera ti riempie i polmoni. Tutto diventa scuro. Poi niente.\n\n💀 GAME OVER – Sei annegato nell'Acheronte\n\nRicomincia dall'ultimo paragrafo salvato o da §1.","126":"La discesa all'ottavo cerchio\n\nTi avvicini al pozzo. Buio. Freddo. L'opposto di tutto quello che hai vissuto finora.\n\n\"Siamo al confine,\" dice Dante. \"Sotto ci sono i fraudolenti. Quelli che hanno usato la mente per ingannare.\"\n\n\"Peggio dei violenti?\"\n\n\"La frode tradisce l'anima. È il peccato più sottile.\"\n\nScendi.\n\n👉 Vai a §127","127":"Il primo cerchio\n\nOltrepassi la soglia di Dite. Ma non entri nel cerchio degli eretici.\n\nInvece, il terreno si apre in una vasta pianura. Non c'è fiamma. Non c'è urlo. Solo un silenzio pieno di sospiri.\n\nDante ti si affianca (se è con te).\n\n\"Siamo nel Limbo,\" dice. \"Il primo cerchio. Qui stanno i non battezzati e i virtuosi vissuti prima di Cristo.\"\n\n\"Non sono dannati?\" chiedi.\n\n\"Sono privati. Non vedranno mai Dio. Ma non subiscono tormenti fisici. Solo il dolore di sapere che manca qualcosa.\"\n\nUn sospiro collettivo ti attraversa le ossa.\n\n👉 Se chiedi a Dante se ci sono anime famose, vai a §128\n👉 Se osservi la pianura in silenzio, vai a §129\n👉 Se cammini verso una luce in lontananza, vai a §130","128":"\"Chi c'è qui?\"\n\n\"Chi c'è qui?\" chiedi.\n\nDante indica la pianura.\n\n\"Molti. Grandi poeti, filosofi, eroi. Tutti quelli che vissero prima della fede. Non peccarono, ma non conobbero la salvezza.\"\n\n\"È giusto?\"\n\nDante ti guarda.\n\n\"Non sta a me dirlo. Sta a Colui che giudica.\"\n\n👉 Se insisti, vai a §131\n👉 Se lasci perdere e cammini, vai a §129","129":"Osservare la pianura\n\nOsservi la pianura. Anime si muovono lente, senza meta. Non corrono, non urlano. Esistono e basta.\n\nUn bambino ti passa accanto. Non ti guarda.\n\n\"Anche i bambini?\" chiedi.\n\n\"I non battezzati,\" risponde Dante. \"Nati senza colpa, ma senza salvezza.\"\n\nIl peso di quelle parole ti schiaccia.\n\n❤️ RESISTENZA -1 → ora 8\n\n👉 Vai a §130","130":"Verso la luce\n\nCammini verso la luce in lontananza. Non è il sole. È più dolce.\n\nPiù ti avvicini, più le anime diventano nitide. Non sono tristi. Sono serie. Dignitose.\n\n\"Là,\" dice Dante, \"dimorano gli spiriti magni. I grandi del pensiero e della poesia.\"\n\n👉 Se chiedi chi siano, vai a §131\n👉 Se acceleri il passo, vai a §132","131":"\"Chi sono i grandi?\"\n\n\"Omero, Orazio, Ovidio, Lucano,\" elenca Dante. \"E molti altri. Filosofi come Socrate e Platone. Eroi come Ettore ed Enea.\"\n\n\"Nomi che ho studiato,\" mormori.\n\n\"Studiato? Ora li vedrai.\"\n\n👉 Vai a §132","132":"Il castello dei grandi\n\nDavanti a te appare un castello. Non ha mura di pietra. È fatto di luce e di fama.\n\nLe porte sono aperte. Nessuno le custodisce.\n\n\"Entra,\" dice Dante. \"Qui nessuno è respinto.\"\n\nVarchi la soglia.\n\nDentro, anime illustri conversano tra loro. Non sembrano dannate. Sembrano saggi.\n\nUna figura si stacca dal gruppo e vi osserva.\n\n👉 Se chiedi a Dante chi è, vai a §133\n👉 Se aspetti che parli, vai a §134","133":"\"Chi è quello?\"\n\n\"Omero,\" risponde Dante. \"Il poeta sovrano. Colui che cantò Achille e Odisseo.\"\n\nOmero vi si avvicina. Parla in greco antico. Dante traduce.\n\n\"Un vivo? Non accadeva da tempo.\"\n\n👉 Se rispondi, vai a §135\n👉 Se resti in silenzio, vai a §136","134":"Attendere\n\nResti in silenzio. La figura si avvicina.\n\nHa un volto severo ma non crudele. Occhi che hanno visto secoli.\n\n\"Benvenuto,\" dice in italiano. La lingua ti sorprende. \"La fama viaggia anche qui. Sappiamo chi sei.\"\n\n\"Non credo,\" rispondi.\n\n\"Lo sapremo.\"\n\n👉 Vai a §135","135":"Dialogo con Omero\n\n\"Sei giovane,\" dice Omero. \"Troppo giovane per essere morto.\"\n\n\"Non sono morto.\"\n\nOmero annuisce.\n\n\"Lo vedo. Sei vivo. Eppure sei qui. Solo un poeta può guidare un vivo nell'Inferno.\"\n\nGuarda Dante.\n\n\"E tu sei poeta.\"\n\nDante china il capo in segno di rispetto.\n\n\"Maestro.\"\n\n⭐ MORALE +1 → ora 7\n\n👉 Vai a §137","136":"Silenzio\n\nResti in silenzio. Omero ti osserva.\n\n\"Non parli. Meglio così. Le parole dei vivi sono spesso vuote.\"\n\nSi volta e torna dal gruppo.\n\nDante ti sussurra:\n\n\"Ti ha giudicato. E non ti ha trovato indegno.\"\n\n👉 Vai a §137","137":"Gli altri poeti\n\nOrazio, Ovidio e Lucano si avvicinano. Ti osservano con curiosità.\n\n\"Un vivo che attraversa l'Inferno,\" dice Orazio. \"Solo Dante ci era riuscito.\"\n\n\"E Virgilio,\" aggiunge Ovidio.\n\nVirgilio. Il nome ti è familiare.\n\n\"Virgilio non è qui?\" chiedi.\n\nDante scuote il capo.\n\n\"Virgilio è nel Limbo. Ma non in questo castello. È più in là. Solo.\"\n\n👉 Se chiedi di vederlo, vai a §138\n👉 Se resti con i poeti, vai a §139","138":"Cercare Virgilio\n\n\"Voglio vederlo,\" dici.\n\nDante esita.\n\n\"Non so se sia saggio.\"\n\n\"Perché?\"\n\n\"Perché Virgilio è il mio maestro. Ma vedermi qui, con un vivo, potrebbe... ferirlo.\"\n\n\"È solo un'anima.\"\n\n\"Non 'solo'. È Virgilio.\"\n\n👉 Se insisti, vai a §140\n👉 Se lasci perdere, vai a §139","139":"Restare con i poeti\n\nResti con i poeti. Parlano di versi, di storie, di eroi.\n\nNon capisci tutto. Ma ascolti.\n\nOrazio ti offre un posto accanto a loro.\n\n\"Non spesso un vivo siede tra i morti. Ricorda questo momento.\"\n\n🧠 PSICHE +1 → ora 16\n\n👉 Vai a §141","140":"Incontrare Virgilio\n\nDante ti conduce oltre il castello. La luce si affievolisce.\n\nPiù in là, seduto su una pietra, c'è un uomo. Ha il volto stanco ma nobile.\n\n\"Virgilio,\" mormora Dante.\n\nL'uomo alza lo sguardo.\n\n\"Dante,\" dice. \"Sei tornato.\"\n\n\"Per accompagnare un vivo.\"\n\nVirgilio ti osserva.\n\n\"Sei qui per imparare?\"\n\n\"Sì,\" rispondi.\n\n\"Allora impara. L'Inferno è dentro di te. Non fuori.\"\n\n⭐ MORALE +1 → ora 8\n🧠 PSICHE +1 → ora 17\n\n👉 Vai a §141","141":"Lasciare il Limbo\n\nIl tempo passa. Non sai quanto. Nel Limbo il tempo non conta.\n\nDante ti tocca la spalla.\n\n\"Dobbiamo andare. Il viaggio continua.\"\n\nSaluti i poeti. Omero annuisce. Virgilio non dice nulla. Ti guarda andare via.\n\nUscendo dal castello, la luce si attenua. La pianura torna grigia.\n\nDavanti a te, una discesa.\n\n\"Il secondo cerchio,\" dice Dante. \"I lussuriosi.\"\n\n👉 Vai a §142","142":"La discesa al secondo cerchio\n\nScendi. L'aria cambia. Diventa calda. Irrequieta.\n\nUn vento lontano porta grida e lamenti.\n\n\"Qui comincia la pena vera,\" dice Dante.\n\n👉 Se chiedi cosa ti aspetta, vai a §143\n👉 Se scendi in silenzio, vai a §144","143":"\"Cosa c'è laggiù?\"\n\n\"I lussuriosi,\" risponde Dante. \"Coloro che si lasciarono travolgere dalla passione senza freno.\"\n\n\"Come Francesca e Paolo?\"\n\n\"Sì. E molti altri. Cleopatra. Didone. Elena. Achille.\"\n\n\"Nomi che conosco.\"\n\n\"Ora li vedrai soffrire.\"\n\n👉 Vai a §144","144":"L'ingresso al secondo cerchio\n\nIl vento diventa tempesta. Corpi trascinati nell'aria. Urla. Lamenti.\n\nSulla soglia, una figura mostruosa.\n\n\"Minosse,\" dice Dante. \"Giudica e avvolge.\"\n\nLa bestia ti fissa.\n\n\"Un vivo?\" ringhia.\n\n👉 Se Dante parla per te, vai a §145\n👉 Se rispondi da solo, vai a §146","145":"Dante parla a Minosse\n\n\"Guarda e passa,\" dice Dante con fermezza. \"A te non spetta giudicare.\"\n\nMinosse digrigna i denti. Ma obbedisce.\n\n\"Passa, allora. E impara.\"\n\n⭐ MORALE +1 → ora 9\n\n👉 Vai a §147","146":"Rispondere a Minosse\n\n\"Non ho paura di te,\" dici.\n\nMinosse ride.\n\n\"Lo avrai.\"\n\nLa sua coda si avvolge. Ma non ti colpisce.\n\n\"Passa. Tanto tornerai.\"\n\n⭐ MORALE -1 → ora 6\n\n👉 Vai a §147","147":"Il vortice dei lussuriosi\n\nOltre Minosse, il vento esplode.\n\nCorpi trascinati. Urti. Grida. Un caos perfetto.\n\nCerchi di guardare.\n\n🧠 PROVA DI PSICHE – Soglia 14\nTira 1D10 + PSICHE (17)\n\n👉 Se SUPERI, resisti. Vai a §148\n👉 Se FALLISCI, cedi. Vai a §149","148":"Resistere al vortice\n\nResisti. Il caos non ti travolge.\n\nCominci a distinguere le anime. Alcune si cercano. Altre fuggono.\n\nUna coppia si muove insieme. Non si separano.\n\n\"Guarda quelli,\" dice Dante. \"Non si lasciano mai.\"\n\n👉 Se chiedi chi sono, vai a §150\n👉 Se osservi in silenzio, vai a §151","149":"Cedere al vortice\n\nIl vento ti disorienta. Perdi l'equilibrio.\n\nDante ti afferra.\n\n\"Tieni duro!\"\n\n❤️ RESISTENZA -2 → ora 7\n\n👉 Vai a §148","150":"\"Chi sono?\"\n\n\"Francesca da Rimini e Paolo Malatesta,\" risponde Dante. \"La loro storia è famosa.\"\n\n\"Raccontamela.\"\n\n\"Lo faranno loro, se le chiami.\"\n\n👉 Se chiami le anime, vai a §152\n👉 Se aspetti, vai a §153","151":"Osservare la coppia\n\nLe due anime si avvicinano. Il vento le spinge verso di te.\n\nUna voce dolce, stanca:\n\n\"Tu che vivi, abbi pietà di noi.\"\n\n👉 Vai a §152","152":"Francesca parla\n\n\"Francesca fui,\" dice l'anima. \"E questi è Paolo.\"\n\nIl vento si placa intorno a lei.\n\n\"Nacque il nostro amore leggendo. Leggevamo di Lancillotto e Ginevra. E più leggevamo, più ci innamoravamo.\"\n\n\"Un giorno, leggendo del bacio, ci baciammo. E non leggemmo oltre.\"\n\n\"Fu quello il nostro peccato?\"\n\nDante risponde per te:\n\n\"Fu il vostro cedimento. L'amore non è peccato. Ma lasciarsi travolgere senza freno, sì.\"\n\n👉 Se provi pietà, vai a §154\n👉 Se condanni, vai a §155","153":"Aspettare\n\nAspetti. Le anime si avvicinano.\n\nPaolo piange. Francesca parla.\n\n\"Il nostro amore fu dolce. Ma la dolcezza ci dannò.\"\n\n\"Non rimpiango l'amore. Rimpiango di non aver saputo fermarmi.\"\n\n👉 Vai a §154","154":"Pietà per Francesca\n\nLa storia ti colpisce. Senti il cuore pesante.\n\n🧠 PROVA DI PSICHE – Soglia 15\nTira 1D10 + PSICHE (17)\n\n👉 Se SUPERI, trattieni la pietà. Vai a §156\n👉 Se FALLISCI, cedi. Vai a §157","155":"Condannare Francesca\n\n\"Avete sbagliato,\" dici. \"L'amore non giustifica tutto.\"\n\nFrancesca abbassa lo sguardo.\n\n\"Forse hai ragione. Ma qui non ci serve la giustizia. Ci serve la verità.\"\n\n⭐ MORALE +1 → ora 7\n\n👉 Vai a §156","156":"Separarsi dalle anime\n\nIl vento riprende forza. Francesca e Paolo vengono risucchiati nel vortice.\n\n\"Addio,\" dice lei. \"E ricorda: anche l'amore può essere dannazione.\"\n\nResti in silenzio.\n\nDante ti tocca la spalla.\n\n\"Prosegui. Il terzo cerchio ti aspetta.\"\n\n👉 Vai a §158","157":"Cedere alla pietà\n\nLa storia di Francesca ti spezza. Cadi in ginocchio.\n\nDante ti aiuta a rialzarti.\n\n\"La pietà è umana. Ma non fermarti qui.\"\n\n❤️ RESISTENZA -2 → ora 5\n⭐ MORALE -1 → ora 5\n\n👉 Vai a §158","158":"Lasciare il secondo cerchio\n\nIl vortice si allontana alle tue spalle. L'aria cambia. Diventa pesante. Umida.\n\nUn odore di marcio sale dal basso.\n\n\"Il terzo cerchio,\" dice Dante. \"I golosi.\"\n\n👉 Se scendi, vai a §159\n👉 Se chiedi a Dante cosa aspettarti, vai a §160","159":"Scendere al terzo cerchio\n\nScendi. La roccia è viscida. L'odore è nauseante.\n\nPoi, la pioggia. Non acqua. Fango. Grandine. Neve marcia.\n\nAnime immerse nella melma. Urlano. Si dimenano.\n\n\"Cerbero,\" dice Dante. \"Lo senti?\"\n\nUn ringhio profondo.\n\n👉 Vai a §161","160":"\"Cosa sono i golosi?\"\n\n\"Coloro che vissero per il cibo, il vino, il piacere del corpo,\" risponde Dante. \"Ora sono sommersi nella melma dei loro stessi eccessi.\"\n\n\"E Cerbero?\"\n\n\"Le tre teste della fame. Divora tutto. Non si sazia mai.\"\n\n👉 Vai a §159","161":"Cerbero\n\nLa bestia emerge dalla pioggia. Tre teste. Tre gole. Tre bocche spalancate.\n\n\"Fermi!\" abbaia.\n\nDante raccoglie una manciata di fango e la getta nelle fauci di Cerbero.\n\nLa bestia divora. Si calma.\n\n\"Passa,\" dice Dante.\n\n👉 Vai a §162","162":"Nel fango del terzo cerchio\n\nCerbero si è ritirato. La pioggia marcia continua a cadere.\n\nCammini nella melma. Ogni passo è una fatica. Anime immerse fino al collo ti guardano passare.\n\n\"Un vivo,\" sussurrano. \"Non lo vedevamo da secoli.\"\n\nUna mano emerge dal fango e ti afferra la caviglia.\n\n\"Portami con te.\"\n\n⚠️ COMBATTIMENTO – Goloso Aggrappato\n\n👉 Vai a §162B","163":"Liberato dal goloso\n\nL'anima cade nella melma. Non riemerge.\n\n\"Grazie,\" gorgoglia. \"Ora riposo.\"\n\nProsegui. La pioggia è sempre più fitta.\n\n❤️ RESISTENZA -1 → ora 4\n\n👉 Vai a §165","164":"Sconfitto dal goloso\n\nL'anima ti trascina nel fango. Riemergi a fatica.\n\n❤️ RESISTENZA -3 → ora 2\n\nDante ti aiuta a rialzarti.\n\n\"Non fermarti. Qui è facile sprofondare.\"\n\n👉 Vai a §165","165":"Una figura nella melma\n\nIn mezzo al fango, una figura si solleva più delle altre.\n\nNon è gonfia come gli altri golosi. È magra. Scavata. Gli occhi sono vigili.\n\n\"Tu,\" dice, \"che vai tra i morti vivo, fermati.\"\n\nTi blocchi.\n\n\"Chi sei?\"\n\n\"A Firenze mi chiamavano Ciacco.\"\n\n👉 Se ti fermi ad ascoltare, vai a §166\n👉 Se prosegui, vai a §167","166":"Ciacco parla\n\nCiacco ti guarda con occhi stanchi.\n\n\"La città divisa,\" dice, \"Firenze, è piena di invidia. Già ora si prepara a sanguinare.\"\n\n\"Che vuoi dire?\"\n\n\"I partiti si scontreranno. I Bianchi e i Neri. E vinceranno i peggiori.\"\n\nDante ascolta in silenzio. Il suo volto è duro.\n\n\"E tu, Dante,\" continua Ciacco, \"sarai cacciato. Esule. Lontano da casa.\"\n\nDante non risponde.\n\n⭐ PROVA DI MORALE – Soglia 12\nTira 1D10 + MORALE (7)\n\n👉 Se SUPERI, consoli Dante. Vai a §168\n👉 Se FALLISCI, resti in silenzio. Vai a §169","167":"Proseguire senza ascoltare\n\nNon ti fermi. La voce di Ciacco ti segue.\n\n\"Anche i vivi fuggono la verità. Ma la verità vi troverà.\"\n\nIl fango lo inghiotte.\n\n⭐ MORALE -1 → ora 4\n\n👉 Vai a §170","168":"Consolare Dante\n\n\"Mi dispiace,\" dici a Dante.\n\nLui scuote il capo.\n\n\"Non dispiacerti. È il destino. Lo sapevo.\"\n\n\"Non ci torni mai più?\"\n\n\"Ci tornerò. Ma non da vivo.\"\n\nCiacco sprofonda nel fango.\n\n\"Addio,\" dice. \"E ricordati: superbia, invidia e avarizia sono le tre faville.\"\n\n⭐ MORALE +1 → ora 6\n\n👉 Vai a §170","169":"Silenzio\n\nResti in silenzio. Dante guarda Ciacco scomparire.\n\n\"Aveva ragione,\" mormora. \"Su tutto.\"\n\nNon sai cosa rispondere.\n\n👉 Vai a §170","170":"Uscire dal terzo cerchio\n\nLa pioggia diminuisce. Il fango si fa meno profondo.\n\nDavanti a te, una nuova discesa.\n\n\"Il quarto cerchio,\" dice Dante. \"Avari e prodighi.\"\n\n👉 Se scendi, vai a §171\n👉 Se chiedi a Dante cosa sono, vai a §172","171":"Scendere al quarto cerchio\n\nScendi. L'aria è secca. Non più umida come sopra.\n\nUn rumore sordo, metallico, sale dal basso.\n\n\"Che cos'è?\"\n\n\"Lo vedrai.\"\n\n👉 Vai a §173","172":"\"Cosa sono avari e prodighi?\"\n\n\"Avari sono coloro che tennero troppo,\" spiega Dante. \"Prodighi chi sprecò senza misura.\"\n\n\"E sono puniti insieme?\"\n\n\"Sì. Si scontrano per sempre. Accusandosi l'un l'altro.\"\n\n\"Perché?\"\n\n\"Perché in vita non seppero trovare la misura.\"\n\n👉 Vai a §171","173":"Il quarto cerchio\n\nLa roccia si apre su una distesa circolare.\n\nDue schiere di dannati spingono enormi pesi rotondi. Vanno incontro l'un l'altra. Si scontrano. Urlano. Si voltano. Ricominciano.\n\n\"Perché tieni?\" grida una schiera.\n\n\"Perché sprechi?\" risponde l'altra.\n\nIl movimento è eterno. Insensato. Perfetto.\n\n👉 Se osservi, vai a §174\n👉 Se chiedi a Dante chi sono, vai a §175","174":"Osservare gli avari e i prodighi\n\nGuardi le due schiere. Sono migliaia.\n\nAlcuni hanno tonache. Chierici. Papi. Cardinali.\n\n\"Anche loro?\" chiedi.\n\n\"Anche loro,\" conferma Dante. \"La ricchezza corrompe anche i santi.\"\n\nUna figura si stacca dalla schiera e ti fissa.\n\nHa il volto di un vecchio. Gli occhi bruciano.\n\n\"Tu,\" dice, \"vivo. Hai denaro?\"\n\n👉 Se rispondi, vai a §176\n👉 Se ignori, vai a §177","175":"\"Chi sono?\"\n\n\"Molti non li riconosceresti,\" dice Dante. \"Ma c'è chi ha fatto la storia.\"\n\nIndica un uomo con una tiara.\n\n\"Papa Adriano V. Morì da pochi anni. È già qui.\"\n\n\"Cos'ha fatto?\"\n\n\"Lesinò sulle offerte. Trattenne per sé.\"\n\nUn altro si avvicina. Ha le catene ai polsi.\n\n\"Plutarco,\" dice Dante. \"Filosofo. Ma anche tesoriere.\"\n\n\"Un filosofo avaro?\"\n\n\"L'intelligenza non salva dall'errore.\"\n\n👉 Vai a §174","176":"Rispondere al vecchio\n\n\"Non ho denaro,\" rispondi.\n\nIl vecchio ride. Un suono secco.\n\n\"Allora sei più povero di me. E io sono dannato.\"\n\nScompare tra la folla.\n\n⭐ MORALE -1 → ora 5\n\n👉 Vai a §177","177":"Ignorare il vecchio\n\nNon rispondi. Il vecchio si allontana.\n\n\"Saggio,\" dice Dante. \"Qui le parole sono inutili.\"\n\n👉 Vai a §178","178":"Attraversare il quarto cerchio\n\nCammini tra le due schiere. I pesi rotolano vicino. Un passo falso e vieni schiacciato.\n\nUn masso ti sfiora.\n\n⚠️ PROVA DI FORZA – Soglia 11\nTira 1D10 + FORZA (12)\n\n👉 Se SUPERI, eviti. Vai a §179\n👉 Se FALLISCI, vieni colpito. Vai a §180","179":"Schivare il masso\n\nLo schivi per un pelo. Il masso colpisce un dannato alle tue spalle.\n\nUrla. Ma non muore. Non può morire.\n\nDante ti afferra il braccio.\n\n\"Più veloce. Non fermarti.\"\n\n❤️ RESISTENZA -1 → ora 3\n\n👉 Vai a §181","180":"Colpito dal masso\n\nIl masso ti colpisce la spalla.\n\n❤️ RESISTENZA -2\n\nCadi nella polvere. Un dannato ti aiuta a rialzarti.\n\n\"Grazie,\" dici.\n\n\"Non ringraziare. Sono dannato. Il mio aiuto non vale.\"\n\n👉 Vai a §181","181":"Uscire dal quarto cerchio\n\nLe due schiere restano indietro. Il rumore dei massi si attenua.\n\nDavanti a te, una palude.\n\n\"La palude Stigia,\" dice Dante. \"Il quinto cerchio.\"\n\n👉 Se scendi, vai a §182\n👉 Se chiedi a Dante cosa c'è, vai a §183","182":"Scendere alla Stigia\n\nScendi. L'aria è pesante, stagnante.\n\nUn odore di acqua morta ti riempie le narici.\n\nSulla superficie della palude, anime si colpiscono. Si mordono. Si trascinano nel fango.\n\n\"Gli iracondi,\" dice Dante. \"Sempre arrabbiati. Sempre in lotta.\"\n\n\"E sotto?\"\n\n\"Gli accidiosi. Non hanno mai agito. Ora gorgogliano senza voce.\"\n\n👉 Vai a §184","183":"\"Cos'è la Stigia?\"\n\n\"La palude dell'ira,\" spiega Dante. \"Qui i violenti contro sé stessi? No. Quelli sono più giù.\"\n\n\"Allora chi è qui?\"\n\n\"Chi ha lasciato che la rabbia li consumasse. E chi non ha mai avuto il coraggio di agire.\"\n\n\"Due peccati opposti?\"\n\n\"Opposti e uguali. Entrambi paralizzano l'anima.\"\n\n👉 Vai a §182","184":"La barca di Flegiàs\n\nIn mezzo alla palude, una barca si avvicina.\n\nA guidarla è un uomo dal volto feroce. Gli occhi ardono.\n\n\"Flegiàs,\" dice Dante.\n\n\"Chi è?\"\n\n\"Un re che diede fuoco al tempio di Apollo. Ora brucia di rabbia per sempre.\"\n\nLa barca tocca la riva.\n\n\"Salite,\" ringhia.\n\n👉 Se sali, vai a §185\n👉 Se esiti, vai a §186","185":"Salire sulla barca\n\nSali. La barca oscilla.\n\nFlegiàs spinge con un remo. La palude si apre.\n\nIntorno a voi, gli iracondi continuano a lottare.\n\nUno di essi si avvicina troppo.\n\n⚠️ COMBATTIMENTO – Iracondo della Palude\n\n👉 Vai a §185B","186":"Esitare\n\nEsiti. Flegiàs alza il remo.\n\n\"O sali o affoghi.\"\n\nSali in fretta.\n\n⭐ MORALE -1 → ora 4\n\n👉 Vai a §185","187":"Iracondo respinto\n\nL'anima cade nella palude. Scompare tra le bolle di fango.\n\nFlegiàs non commenta. Spinge la barca più veloce.\n\n❤️ RESISTENZA -1 → ora 2\n\n👉 Vai a §189","188":"Trascinato nella palude\n\nL'anima ti afferra. Ti trascina fuori dalla barca.\n\nCadi nella palude. Il fango è caldo, denso, soffocante.\n\n❤️ RESISTENZA -4\n\nFlegiàs ti lancia una corda. La prendi. Risali a fatica.\n\n⭐ MORALE -1\n\n👉 Vai a §189","189":"L'altra riva della Stigia\n\nLa barca tocca l'altra riva.\n\nDavanti a te si alzano le mura rosse di Dite.\n\nAlte. Massicce. Invalicabili.\n\n\"Siamo arrivati,\" dice Dante. \"Oltre queste mura comincia l'Inferno vero.\"\n\nLe porte sono chiuse.\n\n👉 Vai a §193\n\n\n================","193":"Le mura di Dite\n\nLa barca tocca la riva. Scendi. Le mura rosse della città sono davanti a te.\n\nDante è accanto a te (se lo hai seguito). O sei solo (se lo hai rifiutato).\n\n\"Siamo arrivati,\" dice Dante. \"Oltre queste mura comincia l'Inferno vero. Quello che nessun vivo dovrebbe vedere.\"\n\nLe porte sono chiuse.\n\n👉 Se cerchi un modo per entrare, vai a §194\n👉 Se chiedi a Dante come si entra, vai a §195\n👉 Se aspetti, vai a §196","194":"Cercare un modo per entrare\n\nTi avvicini alle mura. Sono lisce, impossibili da scalare.\n\nUna voce dall'alto: \"Fermati, vivo.\"\n\nUna figura alata si posa sulla torre. Ha il volto di una donna e il corpo di un uccello.\n\n⚠️ COMBATTIMENTO – Arpia della Guardia\n\n👉 Vai a §194B","195":"Chiedere a Dante\n\n\"Come si entra?\" chiedi.\n\nDante guarda le mura.\n\n\"Non dipende da noi. Là dentro c'è chi decide chi può passare.\"\n\nIndica una torre. Sulla cima, figure si muovono.\n\n\"Dobbiamo aspettare. O convincerli.\"\n\n👉 Se aspetti, vai a §196\n👉 Se chiami le figure sulla torre, vai a §199","196":"Aspettare\n\nAspetti. Il silenzio è pesante.\n\nLe mura non si muovono. Le porte non si aprono.\n\nMinuti che sembrano ore.\n\nPoi, dall'alto, una voce:\n\n\"Chi chiede di entrare?\"\n\n👉 Se rispondi \"Sono un vivo\", vai a §200\n👉 Se lasci parlare Dante (se è con te), vai a §201\n👉 Se non rispondi, vai a §202","197":"Dopo il combattimento con l'Arpia\n\nL'arpia cade a terra. Si dissolve in polvere rossa.\n\nLe mura tremano. Un boato.\n\nLa porta si apre.\n\nDall'interno esce un calore soffocante. Odore di zolfo e sangue.\n\n\"Sei entrato,\" dice Dante. \"Ma non sei il benvenuto.\"\n\n👉 Vai a §203","198":"Sconfitto dall'Arpia\n\nL'arpia ti colpisce al volto. Gli artigli ti squarciano la guancia.\n\n❤️ RESISTENZA -4 → ora (calcola)\n\nCadi. L'arpia risale sulla torre e ride.\n\n\"Non sei degno di entrare.\"\n\nResti a terra, sanguinante.\n\n👉 Se ti rialzi e riprovi, vai a §194\n👉 Se chiedi aiuto a Dante (se è con te), vai a §201","199":"Chiamare le figure\n\n\"Ehi, lassù!\" gridi. \"Fatemi entrare!\"\n\nLe figure sulla torre si fermano. Poi una di loro si affaccia.\n\n\"Un vivo? Qui?\"\n\nRide. Un suono secco, crudele.\n\n\"Se vuoi entrare, paga il pedaggio.\"\n\n⚠️ COMBATTIMENTO – Esattore di Dite\n\n👉 Vai a §199B","200":"Rispondere \"Sono un vivo\"\n\n\"Sono un vivo!\" gridi.\n\nSilenzio. Poi una risata collettiva.\n\n\"Un vivo che vuole entrare nell'Inferno? Sei pazzo o disperato?\"\n\n\"Tutti e due,\" rispondi.\n\nSilenzio. Poi la voce:\n\n\"Fallo entrare. Voglio vedere quanto dura.\"\n\nLa porta si apre.\n\n⭐ MORALE +1\n\n👉 Vai a §203","201":"Dante parla per te\n\nDante si fa avanti.\n\n\"Aprite. Questo viandante è sotto la mia guida.\"\n\nLe figure sulla torre si consultano.\n\n\"Un poeta che guida un vivo? Non si era mai visto.\"\n\n\"Si vede anche adesso,\" risponde Dante.\n\nSilenzio. Poi la porta si apre.\n\n⭐ MORALE +1\n\n👉 Vai a §203","202":"Non rispondere\n\nResti in silenzio.\n\nLe figure sulla torre aspettano. Poi si stancano.\n\n\"Non parla. Non è degno.\"\n\nLa porta resta chiusa.\n\nDante ti guarda (se è con te).\n\n\"Se non parli, nessuno ti ascolterà. Qui non si leggono i pensieri.\"\n\n⭐ MORALE -1\n\n👉 Se provi a chiamare di nuovo, vai a §199\n👉 Se te ne vai, vai a §204","203":"L'ingresso a Dite\n\nVarchi la porta.\n\nL'interno di Dite è peggiore di come lo immaginavi.\n\nNon c'è cielo. Solo una cupola di pietra rossa. Le strade sono lastricate di ossa. L'aria è calda, pesante, impossibile da respirare a fondo.\n\nDavanti a te si apre una distesa di tombe infuocate.\n\n\"Benvenuto nel sesto cerchio,\" dice Dante. \"Qui sono puniti gli eretici.\"\n\n👉 Se ti avvicini a una tomba, vai a §205\n👉 Se chiedi a Dante cosa sono quelle fiamme, vai a §206\n👉 Se osservi l'ambiente prima di muoverti, vai a §207","204":"Allontanarsi da Dite\n\nTi allontani dalle mura.\n\nLa pianura intorno a te è deserta. Bruciata. Morta.\n\nCammini per ore. O forse giorni. Non sai più.\n\nPoi vedi una luce. Non è il sole. È più fredda.\n\nUna figura ti aspetta.\n\n\"Ti sei perso,\" dice. \"L'Inferno è ovunque. Anche qui.\"\n\n❤️ RESISTENZA -3\n⭐ MORALE -2\n\n👉 Vai a §193 (ritorni a Dite, ma più debole)","205":"Avvicinarsi a una tomba\n\nTi avvicini a una delle tombe. La pietra è calda. Dalle fessure esce una luce arancione.\n\nUna voce dall'interno:\n\n\"Chi va?\"\n\nTi fermi.\n\n\"Sono un vivo,\" rispondi.\n\nSilenzio. Poi la tomba si apre.\n\nUna figura emerge. È un uomo. Alto. Orgoglioso. Il fuoco gli lambisce il corpo ma non lo consuma.\n\n\"Un vivo,\" ripete. \"Non succedeva da tempo.\"\n\n⚠️ COMBATTIMENTO – Eretico della Tomba\n\n👉 Vai a §205B","206":"Chiedere delle fiamme\n\n\"Cosa sono quelle fiamme?\" chiedi.\n\nDante guarda le tombe.\n\n\"Sono la loro convinzione. Credevano che l'anima morisse con il corpo. Ora il corpo brucia, ma l'anima no. È il loro contrappasso.\"\n\nUna tomba vicina si apre. Una mano carbonizzata emerge.\n\n\"Aiutami,\" sussurra una voce.\n\n👉 Se provi ad aiutare, vai a §210\n👉 Se ignori e prosegui, vai a §211\n👉 Se chiedi a Dante cosa fare, vai a §212","207":"Osservare l'ambiente\n\nOsservi le tombe. Sono decine. Centinaia.\n\nOgnuna ha un nome inciso. Alcuni li riconosci: filosofi, scienziati, politici.\n\nTutti quelli che hanno negato l'anima.\n\nUna tomba più grande delle altre attira la tua attenzione.\n\nIl nome: FARINATA DEGLI UBERTI.\n\nLa tomba trema.\n\n👉 Se ti avvicini, vai a §213\n👉 Se te ne stai lontano, vai a §214","208":"Eretico sconfitto\n\nL'uomo cade. La spada di fuoco si spegne.\n\nIl suo corpo si ritira nella tomba. La pietra si richiude.\n\n\"Non è finita,\" dice dalla tomba. \"Siamo in tanti, qui.\"\n\nIgnori la voce e prosegui.\n\n❤️ RESISTENZA -2\n\n👉 Vai a §215","209":"Sconfitto dall'Eretico\n\nL'uomo ti colpisce con la spada di fuoco.\n\n❤️ RESISTENZA -5\n\n💀 GAME OVER – Ucciso dall'eretico\n\nRicomincia dall'ultimo salvataggio.","210":"Provare ad aiutare\n\nAllunghi la mano verso la mano carbonizzata.\n\nIl contatto è bruciante.\n\n❤️ RESISTENZA -3\n\nL'urlo che esce dalla tomba è assordante.\n\n\"Non si può aiutare chi è già condannato,\" dice Dante. \"Solo comprendere.\"\n\nLa mano si ritira. La tomba si richiude.\n\n⭐ MORALE -1\n\n👉 Vai a §211","211":"Ignorare e proseguire\n\nIgnori la mano. Prosegui tra le tombe.\n\nIl calore è soffocante. Ogni passo è una fatica.\n\nUna voce ti segue: \"Vile. Come tutti i vivi.\"\n\nNon ti volti.\n\n❤️ RESISTENZA -1\n⭐ MORALE -1\n\n👉 Vai a §215","212":"Chiedere a Dante\n\n\"Cosa faccio?\" chiedi.\n\nDante guarda la mano.\n\n\"Niente. La pietà qui è inutile. Questi non cercano aiuto. Cercano attenzione.\"\n\nLa mano si ritira. La tomba si richiude.\n\n\"Hai imparato qualcosa,\" dice Dante.\n\n🧠 PSICHE +1\n\n👉 Vai a §215","213":"Avvicinarsi a Farinata\n\nTi avvicini alla tomba di Farinata.\n\nLa pietra è più calda delle altre. Molto più calda.\n\nLa tomba si apre.\n\nUn uomo emerge. Alto. Maestoso. Il fuoco gli avvolge il corpo ma non gli tocca il volto.\n\n\"O Tosco che per la città del foco vai vivo così parlando onesto...\"\n\nLa voce è ferma. Orgogliosa.\n\n\"Chi sei?\" chiedi.\n\n\"Farinata degli Uberti. E tu?\"\n\n👉 Se rispondi con il tuo nome, vai a §216\n👉 Se chiedi perché è qui, vai a §217\n👉 Se resti in silenzio, vai a §218","214":"Stare lontano\n\nTe ne stai lontano dalla tomba di Farinata.\n\nMa la tomba si apre lo stesso.\n\n\"Non puoi evitarmi,\" dice la voce. \"Se sei entrato qui, devi ascoltare.\"\n\nUna mano ti afferra la caviglia.\n\n⚠️ COMBATTIMENTO – Mano di Farinata\n\n👉 Vai a §214B","215":"Attraversare il cerchio degli eretici\n\nProsegui tra le tombe. Il calore è infernale.\n\nOgni tanto una voce ti chiama. La ignori.\n\nPoi, davanti a te, una discesa.\n\n\"Il settimo cerchio,\" dice Dante. \"I violenti.\"\n\n👉 Se scendi subito, vai a §221\n👉 Se ti riposi, vai a §222\n👉 Se chiedi a Dante cosa aspettarti, vai a §223","216":"Rispondere con il tuo nome\n\nDici il tuo nome. Farinata annuisce.\n\n\"Non lo conosco. Ma non importa. I nomi dei vivi si perdono. Quelli dei morti restano.\"\n\nGuarda il fuoco che lo avvolge.\n\n\"Chiedi quello che vuoi. Non posso mentire. È la mia pena.\"\n\n👉 Se chiedi di Dante, vai a §224\n👉 Se chiedi del futuro, vai a §225\n👉 Se chiedi perché è così orgoglioso, vai a §226","217":"\"Perché sei qui?\"\n\n\"Perché sei qui?\" chiedi.\n\nFarinata ride. Un riso amaro.\n\n\"Perché ho creduto che l'anima muore con il corpo. Ho sbagliato. E ora pago.\"\n\nIndica le altre tombe.\n\n\"Non sono il solo. Ma sono il più famoso.\"\n\n👉 Se chiedi della sua fama, vai a §227\n👉 Se chiedi di Dante, vai a §224","218":"Restare in silenzio\n\nResti in silenzio.\n\nFarinata ti osserva.\n\n\"Non parli. Meglio così. Chi parla troppo spesso mente.\"\n\nLa tomba comincia a richiudersi.\n\n\"Ricorda il mio nome. Farinata. Un giorno ti servirà.\"\n\nLa pietra si chiude.\n\n⭐ MORALE +1\n\n👉 Vai a §215","219":"Sconfitta la Mano di Farinata\n\nLa mano si ritira. La tomba si richiude.\n\nMa la voce di Farinata ti segue:\n\n\"Hai vinto questa volta. Ma non è finita. Ci rivedremo.\"\n\nUn brivido ti percorre la schiena.\n\n❤️ RESISTENZA -2\n\n👉 Vai a §215","220":"Sconfitto dalla Mano\n\nLa mano ti afferra e ti solleva da terra.\n\nFarinata ride.\n\n\"Vivo, sei debole.\"\n\nTi scaraventa a terra.\n\n❤️ RESISTENZA -5\n\n💀 GAME OVER – Ucciso da Farinata\n\nRicomincia dall'ultimo salvataggio.","221":"Scendere al settimo cerchio\n\nScendi. La roccia è scoscesa. Il calore aumenta. L'odore di zolfo è insopportabile.\n\nPoi lo vedi.\n\nUn fiume di sangue bollente. Anime immerse fino alle sopracciglia. Centauri armati di archi corrono lungo le rive.\n\n\"Il Flegetonte,\" dice Dante. \"Qui sono puniti i violenti contro il prossimo.\"\n\n👉 Se ti avvicini al fiume, vai a §228\n👉 Se osservi i centauri, vai a §229\n👉 Se chiedi a Dante come si attraversa, vai a §230","222":"Riposarsi\n\nTi siedi tra le tombe. Il calore è meno intenso qui.\n\nMangi una razione (se ne hai).\n\n🍞 Se hai una razione, puoi recuperare +3❤️\n\n👉 Se mangi, vai a §222B\n👉 Se non mangi o non hai razioni, vai a §222C","223":"Chiedere a Dante del settimo cerchio\n\n\"Cosa c'è laggiù?\" chiedi.\n\nDante guarda il fiume di sangue.\n\n\"I violenti. Tre cerchi in uno: violenti contro il prossimo, contro sé stessi, contro Dio.\"\n\n\"È pericoloso?\"\n\n\"Sì. Molto.\"\n\n👉 Se scendi lo stesso, vai a §221\n👉 Se chiedi se c'è un'altra via, vai a §231","224":"Chiedere di Dante\n\n\"Conosci Dante?\" chiedi.\n\nFarinata si irrigidisce.\n\n\"Il poeta? Sì. I suoi avi furono miei nemici. Ma lui... lui è diverso.\"\n\nGuarda oltre di te.\n\n\"È qui, vero? Lo sento.\"\n\n👉 Se confermi, vai a §232\n👉 Se neghi, vai a §233\n👉 Se non rispondi, vai a §234","225":"Chiedere del futuro\n\n\"Cosa mi aspetta?\" chiedi.\n\nFarinata ti fissa.\n\n\"Non posso dirtelo. Non perché non voglia. Perché non lo so. Il futuro dei vivi non si legge qui.\"\n\nPoi sorride.\n\n\"Ma so che soffrirai. Tutti soffrono.\"\n\n⭐ MORALE -1\n\n👉 Vai a §215","226":"\"Perché sei così orgoglioso?\"\n\n\"Perché sei così orgoglioso?\" chiedi.\n\nFarinata non ride.\n\n\"Perché non ho nulla da rimpiangere. Ho sbagliato, ma non ho tradito. Ho combattuto, ma non ho tradito. Ho perso, ma non ho tradito.\"\n\n\"L'orgoglio ti ha portato qui.\"\n\n\"L'orgoglio mi ha tenuto in piedi. Preferisco bruciare da solo che spegnermi in compagnia.\"\n\n⭐ MORALE +1\n\n👉 Vai a §215","227":"\"Che fama hai?\"\n\n\"Che fama hai?\" chiedi.\n\nFarinata alza il capo.\n\n\"A Firenze mi ricordano. Come nemico. Come eroe. Dipende da chi parla.\"\n\n\"E a te cosa importa?\"\n\n\"Nulla. La fama è per i vivi. Io sono morto.\"\n\nLa tomba si richiude.\n\n👉 Vai a §215","228":"Avvicinarsi al Flegetonte\n\nTi avvicini al fiume di sangue.\n\nIl calore è tremendo. Le anime immerse urlano. Qualcuno cerca di uscire, ma i centauri lo respingono con le frecce.\n\nUn centauro si volta verso di te.\n\n\"Un vivo? Qui?\"\n\n⚠️ COMBATTIMENTO – Centauro del Flegetonte\n\n👉 Vai a §228B","229":"Osservare i centauri\n\nOsservi i centauri. Sono grandi. Muscolosi. Armati fino ai denti.\n\nUno di loro ti nota.\n\n\"Ehi, vivo. Non dovresti essere qui.\"\n\n\"Lo so,\" rispondi.\n\n\"E allora perché ci sei?\"\n\n👉 Se rispondi \"Perché devo\", vai a §237\n👉 Se rispondi \"Non lo so\", vai a §238\n👉 Se non rispondi, vai a §239","230":"\"Come si attraversa?\"\n\n\"Come si attraversa?\" chiedi.\n\nDante indica i centauri.\n\n\"Loro ci portano. Ma bisogna chiedere.\"\n\n\"E se dicono di no?\"\n\n\"Allora si nuota.\"\n\nGuarda il sangue bollente.\n\n\"Ma non credo che tu voglia.\"\n\n👉 Se ti avvicini a un centauro, vai a §229\n👉 Se cerchi un guado, vai a §240","231":"\"C'è un'altra via?\"\n\n\"C'è un'altra via?\" chiedi.\n\nDante annuisce.\n\n\"Sì. Ma è più lunga. E più pericolosa.\"\n\n\"Più pericolosa di un fiume di sangue?\"\n\n\"Molto.\"\n\n👉 Se prendi l'altra via, vai a §241\n👉 Se scendi al fiume, vai a §221","232":"Confermare che Dante è qui\n\n\"Sì, è qui,\" confermi.\n\nFarinata annuisce.\n\n\"Dimmelo da parte mia: la sua Commedia non basterà a salvarlo. Nessuna parola basta.\"\n\nPoi la tomba si richiude.\n\n⭐ MORALE -1\n\n👉 Vai a §215","233":"Negare che Dante è qui\n\n\"No, non è qui,\" menti.\n\nFarinata ride.\n\n\"Menti male, vivo. Lo sento. La sua poesia puzza di orgoglio.\"\n\nLa tomba si richiude.\n\n⭐ MORALE -2\n\n👉 Vai a §215","234":"Non rispondere\n\nNon rispondi.\n\nFarinata aspetta. Poi sospira.\n\n\"Non vuoi parlare. Va bene.\"\n\nLa tomba si richiude.\n\n👉 Vai a §215","235":"Centauro sconfitto\n\nIl centauro cade. Il suo corpo si dissolve nel sangue del fiume.\n\nGli altri centauri ti guardano. Ma non attaccano.\n\n\"Hai vinto,\" dice uno. \"Passa.\"\n\nAttraversi il fiume su una passerella di pietra.\n\n❤️ RESISTENZA -2\n\n👉 Vai a §242","236":"Sconfitto dal Centauro\n\nIl centauro ti colpisce con la lancia.\n\n❤️ RESISTENZA -5\n\n💀 GAME OVER – Ucciso dal centauro\n\nRicomincia dall'ultimo salvataggio.","237":"\"Perché devo\"\n\n\"Perché devo,\" rispondi.\n\nIl centauro ti osserva.\n\n\"Devi? Nessuno deve nulla. Si sceglie.\"\n\n\"E tu hai scelto di essere qui?\"\n\nIl centauro abbassa lo sguardo.\n\n\"Non parlare di cose che non sai. Passa.\"\n\nTi lascia attraversare.\n\n⭐ MORALE +1\n\n👉 Vai a §242","238":"\"Non lo so\"\n\n\"Non lo so,\" rispondi.\n\nIl centauro ti guarda con pietà.\n\n\"Almeno sei onesto. Passa.\"\n\nTi lascia attraversare.\n\n🧠 PSICHE +1\n\n👉 Vai a §242","239":"Non rispondere al centauro\n\nResti in silenzio.\n\nIl centauro aspetta. Poi si stanca.\n\n\"Non parli? Meglio così. Le parole dei vivi sono tutte uguali.\"\n\nTi volta le spalle.\n\n\"Passa. Ma non tornare.\"\n\nAttraversi il fiume sulla passerella.\n\n❤️ RESISTENZA -1\n\n👉 Vai a §242","240":"Cercare un guado\n\nCerchi un punto dove il fiume sia meno profondo.\n\nCammini lungo la riva. Il calore è tremendo.\n\nUn centauro ti blocca la strada.\n\n\"Non c'è guado. Solo sangue.\"\n\n⚠️ COMBATTIMENTO – Centauro della Riva\n\n👉 Vai a §240B","241":"L'altra via\n\nPrendi l'altra via. Non il fiume. Un sentiero che costeggia la roccia.\n\nÈ stretto. Scivoloso. Un passo falso e cadi nel vuoto.\n\nCammini per ore. Poi il sentiero si allarga.\n\nDavanti a te, una foresta. Ma non di alberi.\n\nDi croci.\n\n\"La foresta dei suicidi,\" dice Dante. \"Il secondo girone dei violenti.\"\n\n👉 Se entri nella foresta, vai a §244\n👉 Se chiedi a Dante cosa sono quelle croci, vai a §245\n👉 Se torni indietro, vai a §246","242":"Dall'altra parte del Flegetonte\n\nSei dall'altra parte del fiume. Il sangue bollente è alle tue spalle.\n\nDavanti a te, una pianura di sabbia ardente. Fiocchi di fuoco cadono dal cielo.\n\n\"Il terzo girone,\" dice Dante. \"I violenti contro Dio. I bestemmiatori.\"\n\nSulla sabbia, anime distese. Urlano. Si torcono. Il fuoco le brucia senza consumarle.\n\n👉 Se ti avvicini a un bestemmiatore, vai a §247\n👉 Se osservi il fuoco dal cielo, vai a §248\n👉 Se chiedi a Dante come si attraversa, vai a §249","243":"Sconfitto dal Centauro\n\nIl centauro ti colpisce con la lancia.\n\n❤️ RESISTENZA -5\n\n💀 GAME OVER – Ucciso dal centauro\n\nRicomincia dall'ultimo salvataggio.","244":"Entrare nella foresta delle croci\n\nEntri nella foresta.\n\nLe croci sono piantate nel terreno come alberi. A ognuna è legata un'anima.\n\nNon urlano. Sussurrano.\n\n\"Perché ci hai dimenticati?\"\n\n\"Perché non hai scelto?\"\n\n\"Perché hai scelto male?\"\n\n🧠 PROVA DI PSICHE – Soglia 13\nTira 1D10 + PSICHE\n\n👉 Se SUPERI, resisti. Vai a §250\n👉 Se FALLISCI, cedi al panico. Vai a §251","245":"Chiedere delle croci\n\n\"Cosa sono quelle croci?\" chiedi.\n\nDante guarda la foresta.\n\n\"Sono i suicidi. Hanno rifiutato il corpo che Dio ha dato loro. Ora sono piante senza vita. Le loro anime sono intrappolate nelle croci.\"\n\n\"Possono parlare?\"\n\n\"Sì. Ma nessuno le ascolta.\"\n\nUna delle croci si agita. Una voce esce.\n\n\"Ascoltami. Ti prego.\"\n\n👉 Se ti avvicini, vai a §252\n👉 Se prosegui, vai a §253","246":"Tornare indietro\n\nTorni indietro. La via del fiume è più breve.\n\nMa il centauro che hai evitato ti aspetta.\n\n\"Lo sapevo. Sei tornato.\"\n\n⚠️ COMBATTIMENTO – Centauro della Riva\n\n👉 Vai a §240B","247":"Avvicinarsi a un bestemmiatore\n\nTi avvicini a un'anima distesa sulla sabbia.\n\nAlza gli occhi verso di te. Sono bruciati.\n\n\"Un vivo,\" sussurra. \"Vieni a prenderti gioco di noi?\"\n\n\"No,\" rispondi.\n\n\"Allora vieni a pregare per noi? È tardi. Molto tardi.\"\n\nIl fuoco dal cielo cade vicino a te.\n\n⚠️ COMBATTIMENTO – Bestemmiatore\n\n👉 Vai a §247B","248":"Osservare il fuoco dal cielo\n\nAlzi gli occhi al cielo. Fiocchi di fuoco cadono lenti, come neve.\n\nUno ti cade vicino. Il calore ti brucia la guancia.\n\n❤️ RESISTENZA -1\n\n\"Non guardare in alto,\" dice Dante. \"Guarda dove metti i piedi.\"\n\n👉 Se ascolti Dante, vai a §256\n👉 Se continui a guardare il cielo, vai a §257","249":"\"Come si attraversa?\"\n\n\"Come si attraversa?\" chiedi.\n\nDante indica un sentiero tra la sabbia.\n\n\"Correndo. Le fiamme cadono a caso. Nessuno è al sicuro.\"\n\n\"E loro?\" chiedi, indicando le anime.\n\n\"Loro non possono scappare. Noi sì.\"\n\n👉 Se corri, vai a §258\n👉 Se cammini piano, vai a §259","250":"Resistere ai sussurri\n\nResisti ai sussurri. Chiudi la mente. Pensi a cose belle. Al mare. Al sole.\n\nI sussurri si affievoliscono.\n\n\"Hai una volontà forte,\" dice una voce dalla croce. \"Forse uscirai vivo.\"\n\n🧠 PSICHE +1\n\n👉 Vai a §253","251":"Cedere al panico\n\nI sussurri ti travolgono. Cadi in ginocchio. Le mani sulla testa.\n\n\"Basta!\" urli.\n\nMa non basta. I sussurri continuano.\n\nDante ti afferra per il braccio e ti trascina via.\n\n\"Alzati. Non ascoltarli.\"\n\n❤️ RESISTENZA -2\n⭐ MORALE -1\n\n👉 Vai a §253","252":"Avvicinarsi a una croce\n\nTi avvicini. L'anima legata ha il volto di un uomo maturo. Occhi tristi.\n\n\"Chi sei?\" chiedi.\n\n\"Pier della Vigna,\" risponde. \"Consigliere dell'imperatore Federico.\"\n\n\"Perché sei qui?\"\n\n\"Mi accusarono ingiustamente. Per paura, mi uccisi. Ora sono qui.\"\n\n\"Ti penti?\"\n\n\"Ogni giorno. Ma il pentimento non cancella l'errore.\"\n\n👉 Se provi a liberarlo, vai a §260\n👉 Se lo compatisci, vai a §261\n👉 Se te ne vai, vai a §262","253":"Attraversare la foresta\n\nCammini tra le croci. Ogni passo è una fatica.\n\nPoi, una radura. Un uomo è in piedi, non legato.\n\n\"Chi sei?\" chiedi.\n\n\"Colui che ha rifiutato la vita,\" risponde. \"E ora la cerca invano.\"\n\n⚠️ COMBATTIMENTO – Il Rifiutante\n\n👉 Vai a §253B","254":"Bestemmiatore sconfitto\n\nL'anima cade sulla sabbia. Il fuoco della sua bocca si spegne.\n\n\"Grazie,\" sussurra. \"Non dovevo bestemmiare. Ma ero arrabbiato.\"\n\n\"Con chi?\"\n\n\"Con Dio. Con la vita. Con me stesso.\"\n\nLa sabbia lo inghiotte.\n\n🧠 PSICHE +1\n\n👉 Vai a §256","255":"Sconfitto dal Bestemmiatore\n\nLa lingua di fuoco ti colpisce al petto.\n\n❤️ RESISTENZA -5\n\n💀 GAME OVER – Ucciso dal bestemmiatore\n\nRicomincia dall'ultimo salvataggio.","256":"Attraversare la sabbia ardente\n\nCorri. Le fiamme cadono intorno a te. Una ti sfiora il braccio.\n\n❤️ RESISTENZA -2\n\nUn'altra ti cade davanti. La eviti per un soffio.\n\nPoi, la fine della pianura. Una rupe.\n\nSotto, un pozzo. Buio. Freddo.\n\n\"Il settimo cerchio è finito,\" dice Dante. \"Ora scendiamo all'ottavo.\"\n\n👉 Se scendi subito, vai a §126\n👉 Se ti riposi, vai a §266\n👉 Se guardi nel pozzo, vai a §267","257":"Guardare il cielo\n\nContinui a guardare il cielo. Le fiamme sono belle. Ipnotiche.\n\nUna ti cade sulla spalla.\n\n❤️ RESISTENZA -3\n\nDante ti strattona.\n\n\"Sei pazzo? Guarda dove cammini!\"\n\nTorni in te. La spalla brucia.\n\n⭐ MORALE -1\n\n👉 Vai a §256","258":"Correre\n\nCorri. Le gambe bruciano. I polmoni pure.\n\nLe fiamme cadono intorno a te. Una ti manca la testa per un pelo.\n\nPoi, la fine. La rupe.\n\nSei dall'altra parte. E sei ancora vivo.\n\n❤️ RESISTENZA -3\n\n👉 Vai a §265","259":"Camminare piano\n\nCammini piano. Ogni passo è una preghiera.\n\nLe fiamme cadono. Ma sembrano evitarti.\n\nForse è la calma. Forse è la fortuna.\n\nArrivi alla rupe senza un graffio in più.\n\n🧠 PSICHE +1\n\n👉 Vai a §265","260":"Provare a liberare Pier della Vigna\n\nTiri i rami. Ma non si staccano.\n\nL'anima geme.\n\n\"Non puoi. Sono legato per sempre.\"\n\n\"Mi dispiace.\"\n\n\"Non dispiacerti. Ascolta. La lealtà è tutto. Non tradire mai chi si fida di te.\"\n\n⭐ MORALE +1\n\n👉 Vai a §262","261":"Compatire Pier della Vigna\n\n\"Mi dispiace per te,\" dici.\n\nPier scuote il capo.\n\n\"Non compatirmi. Ho sbagliato. Ora pago. È giusto.\"\n\n\"Non credi nel perdono?\"\n\n\"Credo. Ma non per me.\"\n\n👉 Vai a §262","262":"Lasciare Pier\n\nTi allontani. La sua voce ti segue.\n\n\"Ricorda: la paura è peggiore della morte.\"\n\nLe parole ti restano dentro.\n\n🧠 PSICHE +1\n\n👉 Vai a §253","263":"Rifiutante sconfitto\n\nL'uomo cade. Scompare.\n\nLa foresta diventa più silenziosa.\n\n\"Grazie,\" sussurra una voce. \"Ora riposiamo.\"\n\n👉 Vai a §265","264":"Sconfitto dal Rifiutante\n\nL'uomo ti atterra.\n\n\"Vivo. Fragile. Come tutti.\"\n\nTi lascia andare. Sparisce.\n\n❤️ RESISTENZA -4\n⭐ MORALE -1\n\n👉 Vai a §265","265":"L'ottavo cerchio\n\nScendi nel pozzo.\n\nÈ buio. Freddo. L'opposto del cerchio precedente.\n\nPoi, la luce. Una luce sporca. Giallastra.\n\nDavanti a te, dieci bolge. Dieci fossati concentrici.\n\n\"Malebolge,\" dice Dante. \"L'ottavo cerchio. Qui sono puniti i fraudolenti.\"\n\n👉 Se chiedi a Dante cosa sono le bolge, vai a §268\n👉 Se scendi nella prima bolgia, vai a §269\n👉 Se osservi da lontano, vai a §270","266":"Riposarsi\n\nTi siedi sulla rupe. Il calore della sabbia è ancora forte.\n\nMangi una razione (se ne hai).\n\n🍞 Se hai una razione, recuperi +3❤️\n\n👉 Se mangi, vai a §266B\n👉 Se non mangi o non hai razioni, vai a §266C","267":"Guardare nel pozzo\n\nGuardi nel pozzo. È profondo. Molto profondo.\n\nNon vedi il fondo. Solo buio.\n\nUna voce sale dal basso:\n\n\"Scendi. Ti aspetto.\"\n\nRiconosci quella voce? No. Ma ti fa paura.\n\n🧠 PROVA DI PSICHE – Soglia 12\nTira 1D10 + PSICHE\n\n👉 Se SUPERI, ignori la voce. Vai a §265\n👉 Se FALLISCI, la voce ti ipnotizza. Vai a §271","268":"Chiedere delle Malebolge\n\n\"Cosa sono le bolge?\" chiedi.\n\nDante indica i fossati.\n\n\"Sono dieci. Ognuna punisce un tipo di frode. Adulatori. Simoniaci. Indovini. Barattieri. Ipocriti. Ladri. Consiglieri fraudolenti. Seminatori di discordia. Falsari.\"\n\n\"Sembra un elenco del carcere.\"\n\n\"L'Inferno è un carcere. Eterno.\"\n\n👉 Se scendi, vai a §269\n👉 Se chiedi quale bolgia è peggiore, vai a §272","269":"Prima bolgia: gli adulatori\n\nScendi nella prima bolgia. Un fosso di escrementi. Anime immerse fino al collo.\n\n\"Bello, questo vivo. Bellissimo. Un angelo.\"\n\nLa lusinga ti fa venire il voltastomaco.\n\n⚠️ COMBATTIMENTO – Adulatore\n\n👉 Vai a §269B","270":"Osservare da lontano\n\nOsservi le bolge da lontano.\n\nVedi anime che corrono. Che urlano. Che si colpiscono tra loro.\n\nUn caos organizzato.\n\n\"Non c'è ordine qui?\" chiedi.\n\n\"C'è. Ma non lo vedi. La frode è disordine. La pena è disordine.\"\n\n👉 Se scendi, vai a §269\n👉 Se chiedi a Dante di accompagnarti, vai a §275","271":"Ipnotizzato dalla voce\n\nLa voce ti ipnotizza. Non puoi staccare gli occhi dal pozzo.\n\nFai un passo avanti. Poi un altro.\n\nDante ti afferra.\n\n\"Cosa fai?\"\n\n\"Scendo,\" rispondi. \"Mi chiama.\"\n\nDante ti schiaffeggia.\n\nTorni in te.\n\n❤️ RESISTENZA -2\n⭐ MORALE -1\n\n👉 Vai a §265","272":"\"Quale bolgia è peggiore?\"\n\n\"Quale è la peggiore?\" chiedi.\n\nDante ci pensa.\n\n\"L'ottava. I consiglieri fraudolenti. Sono nascosti nelle fiamme. Non li vedi, ma loro vedono te.\"\n\n\"E tu li hai visti?\"\n\n\"Sì. Uno di loro mi parlò. Si chiama Ulisse.\"\n\n👉 Vai a §269","273":"Adulatore sconfitto\n\nL'anima cade nel fosso. Non riemerge.\n\n\"La verità fa male,\" dice Dante. \"Più delle lusinghe.\"\n\nAttraversi la bolgia. L'odore è nauseante.\n\n❤️ RESISTENZA -1\n\n👉 Vai a §276","274":"Sconfitto dall'Adulatore\n\nL'anima ti copre di sporcizia.\n\n❤️ RESISTENZA -3\n\n💀 GAME OVER – Soffocato dalla sporcizia\n\nRicomincia dall'ultimo salvataggio.","275":"Dante accompagna\n\nDante ti precede. Scendete insieme.\n\nLa prima bolgia è davanti a voi.\n\n\"Restami vicino,\" dice. \"Qui è facile perdersi.\"\n\n👉 Vai a §269","276":"Seconda bolgia: i simoniaci\n\nScendi nella seconda bolgia. Anime infilate in fori di pietra, a testa in giù. Gambe bruciano.\n\n\"Papa Niccolò III,\" dice Dante, indicando uno.\n\nUna voce dal foro:\n\n\"Dante! Sei tu? Quando arriva Bonifacio?\"\n\n\"Non lo so,\" risponde Dante.\n\n\"Allora aspetto. Brucio e aspetto.\"\n\nIl fuoco sale più alto.\n\n❤️ RESISTENZA -2\n\n👉 Vai a §277","277":"Terza bolgia: gli indovini\n\nScendi. Anime camminano all'indietro. Il collo è torto. Lacrime sulla schiena.\n\nUno ti sfiora.\n\n\"Attento. Tra tre passi cadrai.\"\n\nNon ci credi. Fai tre passi. Cadi.\n\n❤️ RESISTENZA -2\n\n\"Te l'avevo detto,\" ride.\n\n⚠️ COMBATTIMENTO – Indov
