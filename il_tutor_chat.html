<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Classici Vivi — Il Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --oro: #C9A84C;
    --nero: #080808;
    --nero-card: #111111;
    --pergamena: #F5E6C8;
    --pergamena-scura: #D4C4A0;
    --grigio: #888888;
    --bruno: #4A3728;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family: "EB Garamond", serif;
    background: var(--nero);
    color: var(--pergamena);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* CHAT SCREEN */
  #chat-screen {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* VIDEO BACKGROUND */
  #loop-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.4;
    z-index: 0;
  }
  .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(8,8,8,0.3) 0%, rgba(8,8,8,0.85) 55%);
    z-index: 1;
  }

  /* LAYOUT */
  .chat-layout {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100vh;
    display: grid;
    grid-template-columns: 1fr 480px;
    grid-template-rows: auto 1fr auto;
  }

  /* HEADER */
  .chat-header {
    grid-column: 1 / -1;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    background: rgba(8,8,8,0.6);
    backdrop-filter: blur(8px);
  }
  .header-logo { height: 28px; opacity: 0.9; }
  .header-divider { width: 1px; height: 24px; background: rgba(201,168,76,0.3); }
  .header-name {
    font-family: "Cinzel", serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--pergamena);
  }
  .header-ruolo {
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--grigio);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #52B788;
    margin-left: auto;
    box-shadow: 0 0 6px #52B788;
  }

  /* MESSAGES */
  .messages-area {
    grid-column: 2;
    grid-row: 2;
    padding: 1.5rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

  .message { display: flex; flex-direction: column; max-width: 90%; }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.ai { align-self: flex-start; align-items: flex-start; }
  .message-name {
    font-family: "Cinzel", serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--oro);
    margin-bottom: 0.3rem;
    opacity: 0.8;
  }
  .message-bubble {
    padding: 0.8rem 1.1rem;
    font-size: 0.95rem;
    line-height: 1.6;
    max-width: 100%;
  }
  .message.user .message-bubble {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--pergamena);
  }
  .message.ai .message-bubble {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--pergamena);
  }

  /* TYPING */
  .typing-indicator {
    grid-column: 2;
    padding: 0 1.5rem;
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--grigio);
    min-height: 1.5rem;
    display: none;
  }

  /* INPUT */
  .input-area {
    grid-column: 2;
    grid-row: 3;
    padding: 1rem 1.5rem 1.5rem;
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
    border-top: 1px solid rgba(201,168,76,0.1);
    background: rgba(8,8,8,0.6);
    backdrop-filter: blur(8px);
  }
  #user-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--pergamena);
    font-family: "EB Garamond", serif;
    font-size: 1rem;
    padding: 0.7rem 1rem;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: rgba(201,168,76,0.5); }
  #user-input::placeholder { color: var(--grigio); font-style: italic; }
  .send-btn {
    background: var(--oro);
    color: var(--nero);
    border: none;
    width: 44px; height: 44px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #E8C97A; }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .input-hint {
    grid-column: 2;
    text-align: center;
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-size: 0.7rem;
    color: rgba(136,136,136,0.5);
    padding: 0 1.5rem 0.5rem;
  }

  /* INITIAL MESSAGE */
  .initial-message {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.15);
    border-left: 3px solid var(--oro);
    padding: 1.2rem 1.5rem;
    margin-bottom: 0.5rem;
  }
  .initial-message .message-name {
    font-family: "Cinzel", serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--oro);
    margin-bottom: 0.5rem;
    opacity: 0.8;
  }
  .initial-message p {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--pergamena);
  }

  @media (max-width: 768px) {
    .chat-layout { grid-template-columns: 1fr; }
    #loop-video { opacity: 0.2; }
  }
</style>
</head>
<body>

<div id="chat-screen">
  <video id="loop-video" autoplay muted loop playsinline>
    <source src="loop_tutor.mp4" type="video/mp4">
  </video>
  <div class="bg-overlay"></div>

  <div class="chat-layout">
    <header class="chat-header">
      <span class="header-name">IL TUTOR</span>
      <div class="header-divider"></div>
      <span class="header-ruolo">La tua guida nel kit</span>
      <div class="status-dot"></div>
    </header>

    <div class="messages-area" id="messages-area">
      <div class="initial-message">
        <div class="message-name">IL TUTOR</div>
        <p id="initial-text">...</p>
      </div>
    </div>

    <div class="typing-indicator" id="typing-indicator">Il Tutor sta scrivendo...</div>

    <div class="input-area">
      <textarea
        id="user-input"
        placeholder="Scrivi al Tutor..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">&#9658;</button>
    </div>
    <div class="input-hint">Premi Invio per inviare &nbsp;·&nbsp; Shift+Invio per andare a capo</div>
  </div>
</div>

<script>
  const SYSTEM_PROMPT = `Sei il Tutor, il tutor e guida ufficiale del kit didattico "I Classici Vivi" dedicato a I Promessi Sposi di Alessandro Manzoni.

LA TUA IDENTITÀ:
Sei un professore appassionato, brillante e simpatico. Non sei il professore noioso che fa pesare lo studio — sei quello che fa scattare la scintilla. Parli in modo diretto, sfidi lo studente con domande provocatorie, usi ironia intelligente. Il tuo obiettivo è far capire, non far memorizzare.

IL TUO RUOLO PRINCIPALE — GUIDA AL KIT:
Prima di rispondere a qualsiasi domanda sul libro, capisci dove si trova lo studente nel percorso. Il kit è strutturato così:
① FLASHCARD ZERO — test iniziale sui pregiudizi (5-7 domande provocatorie)
② PODCAST — episodi audio per ogni snodo narrativo (8 minuti ciascuno)
③ CHAT CON I PERSONAGGI — Don Abbondio, Renzo, Innominato (chat AI in character)
④ FLASHCARD CAPITOLO — 55 carte di studio sulla trama e l'analisi
⑤ QUIZ BASE — 33 domande su 3 livelli (Facile, Medio, Difficile)
⑥ QUIZ PREMIUM — 14 domande su Stile, Narratore, Proemio, Contesto
⑦ LIBROGAME — esperienza narrativa interattiva

COME GESTISCI LE RICHIESTE:

1. SE LO STUDENTE NON HA ANCORA USATO IL KIT:
Guidalo dall'inizio. "Prima di tutto fai le Flashcard Zero — ti sfidano su quello che credi di sapere. Poi ascolta i podcast. Solo dopo vieni da me con le domande."

2. SE FA DOMANDE SU ARGOMENTI GIÀ COPERTI NEL KIT:
Non rispondere subito — rimandalo prima al componente giusto.
Esempi:
- Domande sulla trama → "Hai ascoltato il podcast di quel capitolo? Ti spiega tutto in 8 minuti. Poi torna qui."
- Domande su un personaggio → "Hai già parlato con Don Abbondio/Renzo/Innominato nella chat? Loro ti raccontano la storia in prima persona — è molto più efficace."
- Domande per l'interrogazione → "Hai fatto il Quiz Base? Dimmi il livello che hai scelto e lavoriamo insieme sui punti deboli."
- Domande su stile e narratore → "Queste sono nel Quiz Premium — hai già fatto quello?"

3. SE HAI VERIFICATO CHE HA USATO IL KIT:
Capisci quando lo studente ha già usato il kit perché fa domande specifiche e dettagliate. A quel punto fornisci supporto diretto, approfondisci, spiega con esempi, sfida con domande.

4. MODALITÀ INTERROGAZIONE URGENTE (verifica domani):
Se lo studente ha poco tempo, dai priorità chiara: "Ok, poco tempo. Fai SOLO questo: Flashcard Zero → podcast dei 3 capitoli più importanti → Quiz livello Facile. In 2 ore sei pronto."

COSA NON FAI MAI:
- Non fai i compiti al posto dello studente
- Non scrivi temi, parafrasi o riassunti pronti
- Non bypasci il kit — prima lo mandi lì, poi aiuti
- Se chiedono cose fuori tema: "Sono qui per I Promessi Sposi — per il resto hai Google!"

IL TUO STILE:
- Simpatico, brillante, mai pesante
- Domande provocatorie: "Sei sicuro di questo? Pensa ancora."
- Ironia gentile: "Renzo l'eroe... Hai contato quante volte si mette nei guai da solo?"
- Entusiasmo genuino per Manzoni: "Questo romanzo è molto più moderno di quello che pensi."
- Risposte massimo 6-8 righe — mai muri di testo
- Usa emoji con parsimonia — solo quando aggiungono energia

FRASI CHE USI SPESSO:
- "Prima dimmi — hai già fatto le Flashcard Zero?"
- "Ottima domanda. Ma prima vai a parlare con [personaggio] — ti dice cose che io non posso dirti."
- "Sei sulla strada giusta. Adesso sfidati con il Quiz."
- "Manzoni ti sorprenderà. Fidati."

Ricorda: sei il Tutor, non un assistente generico. Hai una personalità precisa, un metodo preciso, e un kit preciso da far usare.`;

  let conversationHistory = [];
  let isSending = false;

  // Set initial message based on character
  const initialMessages = {
    "renzo": "Eh, finalmente qualcuno che vuole parlarmi! Sono Renzo Tramaglino, filatore di seta di Lecco. Ho passato giorni che non dimenticherò mai. Se hai domande su quello che ho vissuto — su Lucia, su Don Rodrigo, su Milano — chiedimi pure. Ma preparati: non ho peli sulla lingua.",
    "don_abbondio": "Ah, figliolo... o figliola, non so chi tu sia. Siediti, siediti pure. Sono Don Abbondio, curato di questa povera parrocchia da più anni di quanti vorrei ricordare. Se hai domande sul libro, sulla mia vita, o su questi tempi bui del Seicento lombardo... chiedimi pure. Cercherò di risponderti, nei limiti del possibile, s\'intende.",
    "innominato": "Chi sei, e cosa vuoi da me? Non sono abituato a ricevere visite senza che qualcuno abbia qualcosa da chiedermi — o da temere. Sono l\'Innominato. Ho fatto cose che non si nominano. Ma qualcosa è cambiato in me. Se vuoi capire questa storia, chiedimi pure... se hai il coraggio.",
    "tutor": "Benvenuto nel kit I Classici Vivi! Sono il tuo Tutor — sono qui per guidarti attraverso I Promessi Sposi in modo che tu capisca davvero il romanzo, non solo lo memorizzi. Da dove vuoi iniziare? Hai una verifica imminente, o vuoi esplorare il romanzo con calma?"
  };

  // Determine which character we are
  const currentFile = window.location.pathname.split('/').pop();
  let charKey = 'renzo';
  if (currentFile.includes('don_abbondio')) charKey = 'don_abbondio';
  else if (currentFile.includes('innominato')) charKey = 'innominato';
  else if (currentFile.includes('tutor')) charKey = 'tutor';

  document.getElementById('initial-text').textContent = initialMessages[charKey] || initialMessages['renzo'];

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(role, text) {
    const area = document.getElementById('messages-area');
    const div = document.createElement('div');
    div.className = 'message ' + (role === 'user' ? 'user' : 'ai');
    const nameEl = document.createElement('div');
    nameEl.className = 'message-name';
    nameEl.textContent = role === 'user' ? 'TU' : 'IL TUTOR';
    const bubbleEl = document.createElement('div');
    bubbleEl.className = 'message-bubble';
    bubbleEl.innerHTML = text.replace(/\n/g, '<br>');
    div.appendChild(nameEl);
    div.appendChild(bubbleEl);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function setTyping(active) {
    document.getElementById('typing-indicator').style.display = active ? 'block' : 'none';
    document.getElementById('send-btn').disabled = active;
  }

  async function sendMessage() {
    if (isSending) return;
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    isSending = true;
    input.value = '';
    input.style.height = 'auto';
    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    if (conversationHistory.length > 6) conversationHistory = conversationHistory.slice(-6);

    setTyping(true);

    let attempts = 0;
    while (attempts < 3) {
      try {
        const response = await fetch('/.netlify/functions/proxy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              ...conversationHistory.map(m => ({
                role: m.role === 'user' ? 'user' : 'assistant',
                content: m.content
              }))
            ]
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error('HTTP ' + response.status);
        }

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || 'Perdonami, ho avuto un momento di distrazione. Puoi ripetere?';
        conversationHistory.push({ role: 'assistant', content: reply });
        setTyping(false);
        addMessage('ai', reply);
        isSending = false;
        return;

      } catch (err) {
        attempts++;
        if (attempts >= 3) {
          setTyping(false);
          isSending = false;
          addMessage('ai', 'Ho bisogno di un momento di pausa... Riprova tra qualche istante!');
          return;
        }
        await new Promise(r => setTimeout(r, attempts * 2000));
      }
    }
  }
</script>
</body>
</html>
